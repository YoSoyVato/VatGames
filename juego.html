<!DOCTYPE html>
<html>
<head>
  <title>The Last Exam</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;

      background: url('https://i.pinimg.com/736x/bb/11/ab/bb11abc76809ac2b7426d682bb6b0634.jpg') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    .screen {
      display: none;
      padding: 40px;
    }

    #menu { display: block; }

    #game {
      background: rgba(255,255,255,0.95);
      color: black;
      max-width: 600px;
      margin: auto;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #444;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background: #666;
    }

    #timer {
      font-size: 30px;
      margin-bottom: 20px;
      color: red;
    }

    .question {
      margin: 20px 0;
    }

    .danger {
      animation: flash 0.2s;
    }

    @keyframes flash {
      0% { background: #400; }
      100% { background: transparent; }
    }

    #paperStart {
      display: none;
    }

    .paper {
      background: white;
      color: black;
      width: 400px;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      cursor: pointer;
    }

    .paper input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<!-- MENÚ -->
<div id="menu" class="screen">
  <h1>📄 The Last Exam</h1>
  <p>Termina el examen antes de que el tiempo se acabe...</p>
  <button onclick="startGame()">Empezar</button>
</div>

<!-- HOJA INTERACTIVA -->
<div id="paperStart" class="screen">
  <div class="paper" id="paperBox" onclick="activatePaper()">
    <h2>📄 Examen Final</h2>
    <p id="paperText">(Haz click en la hoja para comenzar)</p>

    <div id="nameSection" style="display:none;">
      <p>Nombre:</p>
      <input type="text" id="playerName" placeholder="Escribe tu nombre..." onclick="event.stopPropagation()">
      <br><br>
      <button onclick="beginExam(event)">Comenzar Examen</button>
    </div>
  </div>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
  <h3 id="playerDisplay"></h3>
  <div id="timer">60</div>
  <div id="questionBox"></div>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen">
  <h1>💀 Game Over</h1>
  <p>No terminaste a tiempo...</p>
  <button onclick="location.reload()">Reintentar</button>
</div>

<!-- VICTORIA -->
<div id="win" class="screen">
  <h1>🎉 Aprobaste</h1>
  <p>Completaste el examen a tiempo</p>
  <button onclick="location.reload()">Jugar otra vez</button>
</div>

<script>
let time = 60;
let current = 0;
let player = "";
let paperActivated = false;

const questions = [
  { q: "¿2 + 2?", a: ["3","4","5"], correct: 1 },
  { q: "Capital de Francia", a: ["Madrid","París","Roma"], correct: 1 },
  { q: "¿5 x 3?", a: ["15","10","20"], correct: 0 },
  { q: "Color del cielo", a: ["Azul","Rojo","Verde"], correct: 0 }
];

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("paperStart").style.display = "block";
}

function activatePaper() {
  if (paperActivated) return;

  paperActivated = true;

  document.getElementById("paperText").innerText = "Completa el examen:";
  document.getElementById("nameSection").style.display = "block";
}

function beginExam(e) {
  e.stopPropagation();

  player = document.getElementById("playerName").value;

  if (player.trim() === "") {
    alert("Escribe tu nombre primero");
    return;
  }

  document.getElementById("paperStart").style.display = "none";
  document.getElementById("game").style.display = "block";

  document.getElementById("playerDisplay").innerText = "Nombre: " + player;

  showQuestion();
  timer();
}

function timer() {
  const interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      clearInterval(interval);
      gameOver();
    }
  }, 1000);
}

function showQuestion() {
  if (current >= questions.length) {
    winGame();
    return;
  }

  const q = questions[current];
  let html = `<div class="question"><h2>${q.q}</h2>`;

  q.a.forEach((ans, i) => {
    html += `<button onclick="answer(${i})">${ans}</button>`;
  });

  html += `</div>`;
  document.getElementById("questionBox").innerHTML = html;
}

function answer(i) {
  const q = questions[current];

  if (i === q.correct) {
    current++;
    showQuestion();
  } else {
    time -= 5;
    document.body.classList.add("danger");
    setTimeout(()=>document.body.classList.remove("danger"), 100);
  }
}

function gameOver() {
  document.getElementById("game").style.display = "none";
  document.getElementById("gameover").style.display = "block";
}

function winGame() {
  document.getElementById("game").style.display = "none";
  document.getElementById("win").style.display = "block";
}
</script>

</body>
</html>
