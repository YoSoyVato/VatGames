<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}
</style>
</head>
<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   ⚙️ CONFIG EDITABLE
========================= */
const CONFIG = {
  CITY_WIDTH:90,
  CITY_HEIGHT:60,
  LAKE_SIZE:200,
  ROAD_LINE_LENGTH:100,
  TOWN_SIZE:15,
  MAIN_ROAD_Y:260,
  TOWNS:5,
  TOWN_SPACING:120
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

/* =========================
   🌍 ZONAS
========================= */
const ZONES=[];

function rectsOverlap(a,b){
 return !(
  a.x + a.w < b.x ||
  a.x > b.x + b.w ||
  a.y + a.h < b.y ||
  a.y > b.y + b.h
 );
}

function defineZones(){

 ZONES.length=0;

 let lake = {
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 };

 let city1 = {
   name:"Ciudad",
   x: lake.x - CONFIG.CITY_WIDTH - 10,
   y: CONFIG.MAIN_ROAD_Y - 40,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 let city2 = {
   name:"Ciudad Norte",
   x: lake.x + lake.w + 10,
   y: CONFIG.MAIN_ROAD_Y - 40,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 ZONES.push(city1);
 ZONES.push(city2);
 ZONES.push(lake);

 /* 🔥 PUEBLOS EN LA CARRETERA */
 for(let i=0;i<CONFIG.TOWNS;i++){

   let x = 120 + i * CONFIG.TOWN_SPACING;

   ZONES.push({
     name:"Pueblo",
     x: x,
     y: CONFIG.MAIN_ROAD_Y - 20,
     w: CONFIG.TOWN_SIZE,
     h: 40
   });
 }
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* =========================
   🌍 GENERACIÓN
========================= */
function generateWorld(){

 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 let lake = ZONES.find(z=>z.name==="Lago");

 /* 🛣️ CARRETERA PRINCIPAL */
 for(let x=0;x<WORLD_COLS;x++){
   map[CONFIG.MAIN_ROAD_Y][x]=T.ROAD;
   map[CONFIG.MAIN_ROAD_Y+1][x]=T.ROAD;
 }

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   /* 🏙️ CIUDAD (NO TOCADA) */
   if(zone==="Ciudad" || zone==="Ciudad Norte"){

     let isRoadLine =
       x % CONFIG.ROAD_LINE_LENGTH === 0 ||
       y % CONFIG.ROAD_LINE_LENGTH === 0;

     if(isRoadLine){
       map[y][x]=T.ROAD;
     } else {
       map[y][x]=T.BUILDING;
     }
   }

   /* 🏘️ PUEBLOS SOLO EN RUTA */
   if(zone==="Pueblo"){

     let isRoad =
       y === CONFIG.MAIN_ROAD_Y ||
       y === CONFIG.MAIN_ROAD_Y + 1;

     if(isRoad){
       map[y][x]=T.ROAD;
     } else {
       map[y][x]=T.BUILDING;
     }
   }
  }
 }

 /* 🌉 PUENTE */
 let startX = lake.x;
 let endX = lake.x + lake.w;

 for(let x=startX; x<endX; x++){
   map[CONFIG.MAIN_ROAD_Y][x]=T.BRIDGE;
   map[CONFIG.MAIN_ROAD_Y+1][x]=T.BRIDGE;
 }

 return map;
}

defineZones();
let city=generateWorld();

/* =========================
   INPUT
========================= */
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   CÁMARA
========================= */
let camX=100*TILE;
let camY=220*TILE;
let speed=5;

function updateCamera(delta){
 if(keys["KeyW"]) camY-=speed*delta;
 if(keys["KeyS"]) camY+=speed*delta;
 if(keys["KeyA"]) camX-=speed*delta;
 if(keys["KeyD"]) camX+=speed*delta;

 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

/* =========================
   RENDER
========================= */
function drawTile(x,y,t){

 if(t===T.ROAD) ctx.fillStyle="#111";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";

 ctx.fillRect(x,y,TILE,TILE);
}

function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);

 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);
  }
 }

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);

 zoneUI.innerText=getZone(px,py);
}

/* =========================
   LOOP
========================= */
let lastTime=performance.now();

function loop(time){

 let delta=(time-lastTime)/16;
 lastTime=time;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateCamera(delta);
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});

</script>
</body>
</html>
