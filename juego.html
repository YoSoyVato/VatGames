<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}
</style>
</head>

<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ========================= */
const CONFIG = {
  CITY_WIDTH:90,
  CITY_HEIGHT:120,
  LAKE_SIZE:200,
  TREE_DENSITY:0.85,
  BRIDGE_Y:250,
  SAFE_MARGIN:20,
  TOWN_SIZE:15
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

/* ========================= */
const ZONES=[];

function rectsOverlap(a,b){
 return !(
  a.x + a.w + CONFIG.SAFE_MARGIN < b.x ||
  a.x > b.x + b.w + CONFIG.SAFE_MARGIN ||
  a.y + a.h + CONFIG.SAFE_MARGIN < b.y ||
  a.y > b.y + b.h + CONFIG.SAFE_MARGIN
 );
}

function clamp(v,min,max){
 return Math.max(min,Math.min(max,v));
}

function defineZones(){

 ZONES.length=0;

 let lake = {
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 };

 let city1 = {
   name:"Ciudad",
   x: lake.x - CONFIG.CITY_WIDTH - 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 let city2 = {
   name:"Ciudad Norte",
   x: lake.x + lake.w + 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 function fixCity(city){
  while(rectsOverlap(city,lake)){
    city.y += 10;
  }
 }

 fixCity(city1);
 fixCity(city2);

 ZONES.push(city1);
 ZONES.push(city2);
 ZONES.push(lake);

 let roadX = Math.floor(city1.x + city1.w/2);
 let roadX2 = Math.floor(city2.x + city2.w/2);

 for(let i=1;i<=5;i++){
   let yPos = city1.y - i*60;
   ZONES.push({ name:"Pueblo", x: roadX - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }

 for(let i=1;i<=5;i++){
   let yPos = city2.y - i*60;
   ZONES.push({ name:"Pueblo", x: roadX2 - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX2 + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* ========================= WORLD */
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));
 let lake = ZONES.find(z=>z.name==="Lago");
 let city = ZONES.find(z=>z.name==="Ciudad");
 let cityN = ZONES.find(z=>z.name==="Ciudad Norte");

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
   let zone=getZone(x,y);

   if(zone==="Lago"){ map[y][x]=T.WATER; continue; }
   if(zone==="Ciudad" || zone==="Ciudad Norte"){ map[y][x]=T.BUILDING; }

   if(zone==="Pueblo"){
     let isRoad = (x % 5 === 0 || y % 5 === 0);
     map[y][x]=isRoad ? T.ROAD : T.BUILDING;
   }
  }
 }

 for(let x=lake.x; x<lake.x+lake.w; x++){
   for(let i=-1;i<=1;i++){
     map[clamp(CONFIG.BRIDGE_Y+i,0,WORLD_ROWS-1)][x]=T.BRIDGE;
   }
 }

 let roadX = Math.floor(city.x + city.w/2);
 let roadX2 = Math.floor(cityN.x + cityN.w/2);

 for(let y=0;y<city.y;y++){
   for(let i=-1;i<=1;i++) map[y][clamp(roadX+i,0,WORLD_COLS-1)]=T.ROAD;
 }

 for(let y=0;y<cityN.y;y++){
   for(let i=-1;i<=1;i++) map[y][clamp(roadX2+i,0,WORLD_COLS-1)]=T.ROAD;
 }

 return map;
}

defineZones();
let city=generateWorld();

/* ========================= VEHÍCULOS */

let vehicles=[];

function spawnVehicle(type){
 let roadTiles=[];

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
   if(city[y][x]===T.ROAD || city[y][x]===T.BRIDGE){
     roadTiles.push({x,y});
   }
  }
 }

 let start = roadTiles[Math.floor(Math.random()*roadTiles.length)];

 vehicles.push({
   x:start.x+0.5,
   y:start.y+0.5,
   dirX:0,
   dirY:0,
   speed:0.05+Math.random()*0.05,
   type:type,
   life:0
 });
}

for(let i=0;i<20;i++){
 spawnVehicle(Math.floor(Math.random()*3));
}

function updateVehicles(){
 for(let v of vehicles){

   v.life++;

   if(v.life % 20 === 0){
     let dirs=[
       {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
     ];

     let valid = dirs.filter(d=>{
       let tx=Math.floor(v.x+d.x);
       let ty=Math.floor(v.y+d.y);
       let t=city[ty]?.[tx];
       return t===T.ROAD || t===T.BRIDGE;
     });

     if(valid.length){
       let d=valid[Math.floor(Math.random()*valid.length)];
       v.dirX=d.x;
       v.dirY=d.y;
     }
   }

   v.x+=v.dirX*v.speed;
   v.y+=v.dirY*v.speed;

   // comportamiento
   if(v.type===0){ // loop
     if(v.life>2000) v.life=0;
   }

   if(v.type===1){ // pueblo -> respawn
     if(getZone(Math.floor(v.x),Math.floor(v.y))==="Pueblo"){
       v.x=Math.random()*WORLD_COLS;
       v.y=Math.random()*WORLD_ROWS;
     }
   }

   if(v.type===2){ // puente
     if(city[Math.floor(v.y)]?.[Math.floor(v.x)]!==T.BRIDGE){
       v.life=999;
     }
   }
 }
}

function drawVehicles(){
 for(let v of vehicles){
   let dx=(v.x*TILE-camX);
   let dy=(v.y*TILE-camY);

   ctx.fillStyle="#ff4444";
   ctx.fillRect(dx-4,dy-4,8,8);
 }
}

/* ========================= INPUT */
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

/* ========================= CÁMARA */
let camX=150*TILE;
let camY=200*TILE;
let speed=5;
let lastTime=performance.now();

function updateCamera(delta){
 let currentSpeed=(keys["ShiftLeft"]||keys["ShiftRight"])?speed*2:speed;

 if(keys["KeyW"]) camY-=currentSpeed*delta;
 if(keys["KeyS"]) camY+=currentSpeed*delta;
 if(keys["KeyA"]) camX-=currentSpeed*delta;
 if(keys["KeyD"]) camX+=currentSpeed*delta;

 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

/* ========================= DRAW */
function drawTile(x,y,t){
 if(t===T.ROAD) ctx.fillStyle="#111";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";
 ctx.fillRect(x,y,TILE,TILE);
}

function drawWorld(){
 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);
  }
 }

 drawVehicles();

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);
 zoneUI.innerText=getZone(px,py);
}

/* ========================= LOOP */
function loop(time){
 let delta=(time-lastTime)/16;
 lastTime=time;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateCamera(delta);
 updateVehicles();
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>

</body>
</html>
