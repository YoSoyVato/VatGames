<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}
</style>
</head>
<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const CONFIG = {
  CITY_WIDTH:90,
  CITY_HEIGHT:60,
  LAKE_SIZE:200,
  TREE_DENSITY:0.85,
  BRIDGE_Y:250,
  SAFE_MARGIN:20,
  TOWN_SIZE:15
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

const ZONES=[];

function rectsOverlap(a,b){
 return !(
  a.x + a.w + CONFIG.SAFE_MARGIN < b.x ||
  a.x > b.x + b.w + CONFIG.SAFE_MARGIN ||
  a.y + a.h + CONFIG.SAFE_MARGIN < b.y ||
  a.y > b.y + b.h + CONFIG.SAFE_MARGIN
 );
}

function defineZones(){

 ZONES.length=0;

 let lake = { name:"Lago", x:150, y:150, w:CONFIG.LAKE_SIZE, h:CONFIG.LAKE_SIZE };

 let city1 = {
   name:"Ciudad",
   x: lake.x - CONFIG.CITY_WIDTH - 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 let city2 = {
   name:"Ciudad Norte",
   x: lake.x + lake.w + 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 function fixCity(city){
  while(rectsOverlap(city,lake)){
    city.y += 10;
  }
 }

 fixCity(city1);
 fixCity(city2);

 ZONES.push(city1,city2,lake);

 let roadX1 = Math.floor(city1.x + city1.w/2);
 let roadX2 = Math.floor(city2.x + city2.w/2);

 /* 🔥 PUEBLOS ARRIBA */
 for(let i=1;i<=5;i++){
   let y1 = city1.y - i*60;
   let y2 = city2.y - i*60;

   ZONES.push({ name:"Pueblo", x: roadX1-40, y:y1, w:15, h:15 });
   ZONES.push({ name:"Pueblo", x: roadX1+25, y:y1, w:15, h:15 });

   ZONES.push({ name:"Pueblo", x: roadX2-40, y:y2, w:15, h:15 });
   ZONES.push({ name:"Pueblo", x: roadX2+25, y:y2, w:15, h:15 });
 }

 /* 🔥 PUEBLOS ABAJO (NUEVO) */
 for(let i=1;i<=5;i++){
   let y1 = city1.y + city1.h + i*60;
   let y2 = city2.y + city2.h + i*60;

   ZONES.push({ name:"Pueblo", x: roadX1-40, y:y1, w:15, h:15 });
   ZONES.push({ name:"Pueblo", x: roadX1+25, y:y1, w:15, h:15 });

   ZONES.push({ name:"Pueblo", x: roadX2-40, y:y2, w:15, h:15 });
   ZONES.push({ name:"Pueblo", x: roadX2+25, y:y2, w:15, h:15 });
 }
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));
 let lake = ZONES.find(z=>z.name==="Lago");
 let city1 = ZONES.find(z=>z.name==="Ciudad");
 let city2 = ZONES.find(z=>z.name==="Ciudad Norte");

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
   let zone=getZone(x,y);

   if(zone==="Lago"){ map[y][x]=T.WATER; continue; }
   if(zone==="Ciudad"||zone==="Ciudad Norte") map[y][x]=T.BUILDING;

   if(zone==="Pueblo"){
     if(x%5===0||y%5===0) map[y][x]=T.ROAD;
     else map[y][x]=T.BUILDING;
   }
  }
 }

 /* PUENTE */
 for(let x=lake.x;x<lake.x+lake.w;x++){
  for(let i=-1;i<=1;i++) map[CONFIG.BRIDGE_Y+i][x]=T.BRIDGE;
 }

 let roadX1=Math.floor(city1.x+city1.w/2);
 let roadX2=Math.floor(city2.x+city2.w/2);

 /* 🔥 RUTAS VERTICALES COMPLETAS (ARRIBA Y ABAJO) */
 for(let y=0;y<WORLD_ROWS;y++){
   for(let i=-1;i<=1;i++){
     map[y][roadX1+i]=T.ROAD;
     map[y][roadX2+i]=T.ROAD;
   }
 }

 /* 🔥 CONEXIÓN A PUENTE */
 for(let x=roadX1;x<lake.x;x++){
   for(let i=-1;i<=1;i++) map[CONFIG.BRIDGE_Y+i][x]=T.ROAD;
 }

 for(let x=lake.x+lake.w;x<=roadX2;x++){
   for(let i=-1;i<=1;i++) map[CONFIG.BRIDGE_Y+i][x]=T.ROAD;
 }

 /* 🔥 CONEXIÓN A PUEBLOS */
 for(let z of ZONES){
   if(z.name==="Pueblo"){
     let cy=Math.floor(z.y+z.h/2);
     let cx=Math.floor(z.x+z.w/2);
     let targetX = cx < WORLD_COLS/2 ? roadX1 : roadX2;

     for(let x=Math.min(cx,targetX);x<=Math.max(cx,targetX);x++){
       for(let i=-1;i<=1;i++){
         map[cy+i][x]=T.ROAD;
       }
     }
   }
 }

 return map;
}

defineZones();
let city=generateWorld();

/* CONTROLES Y RENDER IGUAL */
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

let camX=100*TILE;
let camY=220*TILE;
let speed=5;
let lastTime=performance.now();

function updateCamera(delta){
 if(keys["KeyW"]) camY-=speed*delta;
 if(keys["KeyS"]) camY+=speed*delta;
 if(keys["KeyA"]) camX-=speed*delta;
 if(keys["KeyD"]) camX+=speed*delta;

 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

let treesData={};
function hasTree(x,y){
 let key=x+","+y;
 if(!treesData[key]){
   let tile = city[y]?.[x];
   treesData[key]=(
     getZone(x,y)==="Bosque" &&
     tile!==T.ROAD &&
     tile!==T.BRIDGE &&
     Math.random()>CONFIG.TREE_DENSITY
   );
 }
 return treesData[key];
}

function drawTile(x,y,t){
 if(t===T.ROAD) ctx.fillStyle="#111";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";
 ctx.fillRect(x,y,TILE,TILE);
}

function drawWorld(){
 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;
   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);
   drawTile(dx,dy,t);
   if(hasTree(x,y)) drawTree(dx,dy);
  }
 }
}

function drawTree(x,y){
 ctx.fillStyle="#4a2f1b";
 ctx.fillRect(x+14,y+20,4,10);
 ctx.fillStyle="#2f7a3f";
 ctx.beginPath();
 ctx.arc(x+16,y+14,9,0,Math.PI*2);
 ctx.fill();
}

function loop(time){
 let delta=(time-lastTime)/16;
 lastTime=time;
 ctx.clearRect(0,0,canvas.width,canvas.height);
 updateCamera(delta);
 drawWorld();
 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
