<script>

/* =========================
   🧠 CONFIG EDITABLE (IMPORTANTE)
   👉 Cambia TODO desde acá como diseñador
========================= */

const CONFIG = {

  // tamaño de ciudades
  CITY_SIZE:100,

  // tamaño lago
  LAKE_SIZE:200,

  // frecuencia calles (más bajo = más calles)
  ROAD_SPACING:5,

  // densidad bosque
  TREE_DENSITY:0.85,

  // posición puente
  BRIDGE_Y:250
};


/* =========================
   ZONAS EDITABLES 🔥
   👉 SOLO TOCA ESTO para cambiar el mapa
========================= */

function defineZones(){

 ZONES.length = 0; // limpia (importante)

 ZONES.push({
   name:"Ciudad",
   x:80,
   y:200,
   w:CONFIG.CITY_SIZE,
   h:CONFIG.CITY_SIZE
 });

 ZONES.push({
   name:"Ciudad Norte",
   x:320,
   y:200,
   w:CONFIG.CITY_SIZE,
   h:CONFIG.CITY_SIZE
 });

 ZONES.push({
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 });
}


/* =========================
   🌍 GENERACIÓN PRO
========================= */

function generateWorld(){

 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   // 🌊 LAGO PRIORIDAD
   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   // 🏙️ CIUDADES
   if(zone==="Ciudad" || zone==="Ciudad Norte"){

     // 🔥 GRID REAL (NO AL REVÉS)
     if(x % CONFIG.ROAD_SPACING === 0 || y % CONFIG.ROAD_SPACING === 0){
       map[y][x]=T.ROAD;
     } else {
       map[y][x]=T.BUILDING;
     }
   }
  }
 }

 // 🌉 PUENTE (CRUZA TODO EL LAGO)
 let startX = 150;
 let endX = 150 + CONFIG.LAKE_SIZE;

 for(let x=startX; x<endX; x++){
   map[CONFIG.BRIDGE_Y][x]=T.BRIDGE;
   map[CONFIG.BRIDGE_Y+1][x]=T.BRIDGE;
 }

 return map;
}


/* =========================
   🏢 FIX EDIFICIOS (ANTI-BUG)
========================= */

function drawBuilding(x,y,worldX,worldY){

 // 🔥 usar coordenadas del mundo (NO pantalla)
 let d=getBuildingData(worldX,worldY);
 let h=d.height;

 x=Math.round(x);
 y=Math.round(y);

 let colors=["#5a4a3f","#4b5a3f","#3f4a5a"];
 ctx.fillStyle=colors[d.style];

 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#222";
 ctx.fillRect(x,y-h,32,4);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#ffd966" : "#1a1a1a";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}


/* =========================
   🌳 BOSQUE PRO
========================= */

function hasTree(x,y){
 let key=x+","+y;

 if(!treesData[key]){
  let zone=getZone(x,y);

  treesData[key]=(
    zone==="Bosque" &&
    Math.random()>CONFIG.TREE_DENSITY
  );
 }

 return treesData[key];
}


/* =========================
   🛣️ CALLES 90s PRO
========================= */

function drawTile(x,y,t){

 x=Math.round(x);
 y=Math.round(y);

 if(t===T.ROAD) ctx.fillStyle="#3a3a3a";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";

 ctx.fillRect(x,y,TILE,TILE);

 // 🛣️ estilo USA 90s
 if(t===T.ROAD){

  // línea amarilla central
  ctx.strokeStyle="#d4c76b";
  ctx.lineWidth=2;

  ctx.beginPath();
  ctx.moveTo(x,y+16);
  ctx.lineTo(x+32,y+16);
  ctx.stroke();

  // desgaste
  ctx.strokeStyle="#ffffff10";
  ctx.strokeRect(x,y,32,32);
 }

 // 🌉 puente mejorado
 if(t===T.BRIDGE){

  ctx.strokeStyle="#5c3b1e";

  for(let i=0;i<32;i+=8){
    ctx.beginPath();
    ctx.moveTo(x+i,y);
    ctx.lineTo(x+i,y+32);
    ctx.stroke();
  }

  ctx.strokeStyle="#2b1a0d";
  ctx.beginPath();
  ctx.moveTo(x,y+4);
  ctx.lineTo(x+32,y+4);
  ctx.moveTo(x,y+28);
  ctx.lineTo(x+32,y+28);
  ctx.stroke();
 }
}


/* =========================
   🌍 RENDER FIX TOTAL
========================= */

function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);

 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);

   // 🔥 FIX: usar coords del mundo
   if(t===T.BUILDING){
    drawBuilding(dx,dy,x,y);
   }

   if(getZone(x,y)==="Bosque" && hasTree(x,y)){
    drawTree(dx,dy);
   }
  }
 }

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);

 zoneUI.innerText=getZone(px,py);
}

</script>
