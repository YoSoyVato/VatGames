<style>
  body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    /* FONDO DE AULA */
    background: url('https://images.unsplash.com/photo-1588072432836-e10032774350?auto=format&fit=crop&w=1920&q=80') no-repeat center/cover;
  }

  /* OSCURECER FONDO */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
  }

  .screen {
    display: none;
    padding: 40px;
  }

  #menu { display: block; }

  /* CAJA TIPO EXAMEN */
  #game {
    background: rgba(255,255,255,0.95);
    color: black;
    max-width: 600px;
    margin: auto;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
  }

  button {
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #2c3e50;
    color: white;
    font-size: 16px;
  }

  button:hover {
    background: #34495e;
  }

  #timer {
    font-size: 30px;
    margin-bottom: 20px;
    color: red;
  }

  .question {
    margin: 20px 0;
  }

  .danger {
    animation: flash 0.2s;
  }

  @keyframes flash {
    0% { background: #400; }
    100% { background: transparent; }
  }
</style>
