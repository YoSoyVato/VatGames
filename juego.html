<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (Ciudad Densa Mejorada)</title>
<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;
const rows=Math.floor(canvas.height/TILE);
const cols=Math.floor(canvas.width/TILE);

const T={ROAD:0,BUILDING:1};

// NUEVA GENERACIÓN (más calles + sin pasto)
function generateCity(){
 let map=[];

 for(let y=0;y<rows;y++){
  let row=[];
  for(let x=0;x<cols;x++){

   // Calles principales
   if(x%8===0 || y%8===0){
     row.push(T.ROAD);
   }
   // Calles secundarias (mitad de bloque)
   else if(x%4===0 || y%4===0){
     row.push(Math.random()>0.5 ? T.ROAD : T.BUILDING);
   }
   else{
     row.push(T.BUILDING);
   }

  }
  map.push(row);
 }

 return map;
}

let city=generateCity();

// Datos persistentes
let buildingsData = {};

function getBuildingData(x,y){
 let key = x+","+y;
 if(!buildingsData[key]){
  let windows = [];
  let h = 70 + Math.random()*40;

  for(let wy=10; wy<h-10; wy+=12){
    for(let wx=6; wx<26; wx+=10){
      windows.push({
        x: wx,
        y: wy,
        on: Math.random()>0.2
      });
    }
  }

  buildingsData[key] = { height:h, windows:windows };
 }
 return buildingsData[key];
}

// CALLES MEJORADAS
function drawGround(x,y,t,gridX,gridY){
 if(t===T.ROAD){
  ctx.fillStyle="#2b2f36";
  ctx.fillRect(x,y,TILE,TILE);

  ctx.strokeStyle="#777";
  ctx.lineWidth=2;

  let up = city[gridY-1]?.[gridX]===T.ROAD;
  let down = city[gridY+1]?.[gridX]===T.ROAD;
  let left = city[gridY]?.[gridX-1]===T.ROAD;
  let right = city[gridY]?.[gridX+1]===T.ROAD;

  ctx.beginPath();

  if(left && right){
    ctx.moveTo(x,y+16);
    ctx.lineTo(x+32,y+16);
  }

  if(up && down){
    ctx.moveTo(x+16,y);
    ctx.lineTo(x+16,y+32);
  }

  ctx.stroke();
 }

 if(t===T.BUILDING){
  ctx.fillStyle="#1c222b";
  ctx.fillRect(x,y,TILE,TILE);
 }
}

function drawBuilding(x,y){
 let data = getBuildingData(x,y);
 let h = data.height;

 ctx.fillStyle="rgba(0,0,0,0.35)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 ctx.fillStyle="#962d22";
 ctx.fillRect(x+28,y-h,4,h);

 for(let w of data.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawCity(){
 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   let t=city[y][x];
   let dx=x*TILE;
   let dy=y*TILE;
   drawGround(dx,dy,t,x,y);
  }
 }

 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   let t=city[y][x];
   let dx=x*TILE;
   let dy=y*TILE;

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }
  }
 }
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 drawCity();
 requestAnimationFrame(loop);
}

loop();

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
