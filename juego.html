<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (Edificios Mejorados)</title>
<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;
const rows=Math.floor(canvas.height/TILE);
const cols=Math.floor(canvas.width/TILE);

const T={ROAD:0,BUILDING:1,PARK:2};

function generateCity(){
 let map=[];
 for(let y=0;y<rows;y++){
  let row=[];
  for(let x=0;x<cols;x++){
   if(x%10===0||y%10===0) row.push(T.ROAD);
   else{
    let r=Math.random();
    if(r<0.8) row.push(T.BUILDING);
    else row.push(T.PARK);
   }
  }
  map.push(row);
 }
 return map;
}

let city=generateCity();

// Guardar datos de edificios (IMPORTANTE: ya no cambian cada frame)
let buildingsData = {};

function getBuildingData(x,y){
 let key = x+","+y;
 if(!buildingsData[key]){
  buildingsData[key] = {
    height: 70 + Math.random()*40
  };
 }
 return buildingsData[key];
}

function drawGround(x,y,t){
 if(t===T.ROAD){
  ctx.fillStyle="#2b2f36";
  ctx.fillRect(x,y,TILE,TILE);

  ctx.strokeStyle="#444";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x,y+TILE/2);
  ctx.lineTo(x+TILE,y+TILE/2);
  ctx.stroke();
 }

 if(t===T.PARK){
  ctx.fillStyle="#1f5f3a";
  ctx.fillRect(x,y,TILE,TILE);
 }

 if(t===T.BUILDING){
  ctx.fillStyle="#1c222b";
  ctx.fillRect(x,y,TILE,TILE);
 }
}

// NUEVOS edificios (rojo + blanco)
function drawBuilding(x,y){
 let data = getBuildingData(x,y);
 let h = data.height;

 // sombra
 ctx.fillStyle="rgba(0,0,0,0.35)";
 ctx.fillRect(x+5,y-h+5,32,h);

 // cuerpo rojo
 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 // techo blanco
 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 // borde lateral (detalle)
 ctx.fillStyle="#962d22";
 ctx.fillRect(x+28,y-h,4,h);

 // ventanas (más ordenadas)
 for(let wy=10; wy<h-10; wy+=12){
  for(let wx=6; wx<26; wx+=10){
   ctx.fillStyle = Math.random()>0.2 ? "#f7dc6f" : "#2c3e50";
   ctx.fillRect(x+wx, y-h+wy, 5, 6);
  }
 }
}

function drawTree(x,y){
 ctx.fillStyle="#145a32";
 ctx.beginPath();
 ctx.arc(x+16,y+16,8,0,Math.PI*2);
 ctx.fill();
}

function drawCity(){
 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   let t=city[y][x];
   let dx=x*TILE;
   let dy=y*TILE;
   drawGround(dx,dy,t);
  }
 }

 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   let t=city[y][x];
   let dx=x*TILE;
   let dy=y*TILE;

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }

   if(t===T.PARK && Math.random()>0.7){
    drawTree(dx,dy);
   }
  }
 }
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 drawCity();
 requestAnimationFrame(loop);
}

loop();

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
