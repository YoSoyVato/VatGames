<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (Calles PRO + Sin temblores)</title>
<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;
const WORLD_ROWS=200;
const WORLD_COLS=200;

const T={ROAD:0,BUILDING:1};

// 🧠 GENERACIÓN LIMPIA: NUNCA EDIFICIOS EN CALLE
function generateCity(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.BUILDING));

 // Avenidas principales
 const rows=[Math.floor(WORLD_ROWS*0.25),Math.floor(WORLD_ROWS*0.5),Math.floor(WORLD_ROWS*0.75)];
 rows.forEach(r=>{
  for(let x=0;x<WORLD_COLS;x++){
    map[r][x]=T.ROAD;
    if(map[r+1]) map[r+1][x]=T.ROAD;
  }
 });

 const center=Math.floor(WORLD_COLS/2);
 for(let y=0;y<WORLD_ROWS;y++){
  map[y][center]=T.ROAD;
  if(map[y][center+1]) map[y][center+1]=T.ROAD;
 }

 // Calles secundarias
 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
    if(map[y][x]===T.ROAD) continue;
    if(x%10===0 || y%10===0) map[y][x]=T.ROAD;
  }
 }

 // BUFFER SOLO PARA EDIFICIOS (no toca calles)
 let finalMap = map.map(r=>r.slice());
 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
    if(map[y][x]===T.BUILDING){
      let nearRoad = map[y+1]?.[x]===T.ROAD || map[y-1]?.[x]===T.ROAD || map[y]?.[x+1]===T.ROAD || map[y]?.[x-1]===T.ROAD;
      if(nearRoad && Math.random()>0.7){
        finalMap[y][x]=T.ROAD; // vereda ligera
      }
    }
  }
 }
 return finalMap;
}

let city=generateCity();

// 🎮 CÁMARA (SIN TEMBLOR → valores enteros)
let camX=0, camY=0;
let speed=6;
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function updateCamera(){
 if(keys["w"]) camY-=speed;
 if(keys["s"]) camY+=speed;
 if(keys["a"]) camX-=speed;
 if(keys["d"]) camX+=speed;

 // 🔥 evitar subpixeles (causa del temblor)
 camX = Math.floor(camX);
 camY = Math.floor(camY);
}

// DATOS EDIFICIOS
let buildingsData={};
function getBuildingData(x,y){
 let key=x+","+y;
 if(!buildingsData[key]){
  let windows=[];
  let h=70+Math.random()*40;
  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({x:wx,y:wy,on:Math.random()>0.2});
    }
  }
  buildingsData[key]={height:h,windows:windows};
 }
 return buildingsData[key];
}

// 🛣️ CALLES PRO (intersecciones reales)
function drawGround(x,y,t,gx,gy){
 if(t===T.ROAD){
  ctx.fillStyle="#2b2f36";
  ctx.fillRect(x,y,TILE,TILE);

  ctx.strokeStyle="#aaa";
  ctx.lineWidth=2;

  let up = city[gy-1]?.[gx]===T.ROAD;
  let down = city[gy+1]?.[gx]===T.ROAD;
  let left = city[gy]?.[gx-1]===T.ROAD;
  let right = city[gy]?.[gx+1]===T.ROAD;

  ctx.beginPath();

  if(left) { ctx.moveTo(x,y+16); ctx.lineTo(x+16,y+16); }
  if(right){ ctx.moveTo(x+16,y+16); ctx.lineTo(x+32,y+16); }
  if(up)   { ctx.moveTo(x+16,y); ctx.lineTo(x+16,y+16); }
  if(down) { ctx.moveTo(x+16,y+16); ctx.lineTo(x+16,y+32); }

  ctx.stroke();
 }

 if(t===T.BUILDING){
  ctx.fillStyle="#1c222b";
  ctx.fillRect(x,y,TILE,TILE);
 }
}

// 🏢 EDIFICIOS
function drawBuilding(x,y){
 let d=getBuildingData(x,y);
 let h=d.height;

 ctx.fillStyle="rgba(0,0,0,0.35)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 ctx.fillStyle="#962d22";
 ctx.fillRect(x+28,y-h,4,h);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawCity(){
 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=Math.floor((x*TILE)-camX);
   let dy=Math.floor((y*TILE)-camY);

   drawGround(dx,dy,t,x,y);
   if(t===T.BUILDING) drawBuilding(dx,dy);
  }
 }
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 updateCamera();
 drawCity();
 requestAnimationFrame(loop);
}

loop();

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
