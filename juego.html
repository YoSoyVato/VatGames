<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}
</style>
</head>
<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   ⚙️ CONFIG EDITABLE
========================= */
const CONFIG = {
  CITY_WIDTH:75,   // 🔥 ancho ciudad
  CITY_HEIGHT:50,  // 🔥 alto ciudad
  LAKE_SIZE:200,
  ROAD_SPACING:6,
  AVENUE_SPACING:12, // 🔥 avenidas grandes (nuevo)
  TREE_DENSITY:0.85,
  BRIDGE_Y:250,
  SAFE_MARGIN:20
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

/* =========================
   🌍 ZONAS
========================= */
const ZONES=[];

function rectsOverlap(a,b){
 return !(
  a.x + a.w + CONFIG.SAFE_MARGIN < b.x ||
  a.x > b.x + b.w + CONFIG.SAFE_MARGIN ||
  a.y + a.h + CONFIG.SAFE_MARGIN < b.y ||
  a.y > b.y + b.h + CONFIG.SAFE_MARGIN
 );
}

function defineZones(){

 ZONES.length=0;

 let lake = {
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 };

 // 🔥 ciudades 75x50
 let city1 = {name:"Ciudad", x:60, y:260, w:CONFIG.CITY_WIDTH, h:CONFIG.CITY_HEIGHT};
 let city2 = {name:"Ciudad Norte", x:340, y:260, w:CONFIG.CITY_WIDTH, h:CONFIG.CITY_HEIGHT};

 function fixCity(city){
  while(rectsOverlap(city,lake)){
    city.y += 10;
  }
 }

 fixCity(city1);
 fixCity(city2);

 ZONES.push(city1);
 ZONES.push(city2);
 ZONES.push(lake);
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* =========================
   🌍 GENERACIÓN
========================= */
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 let lake = ZONES.find(z=>z.name==="Lago");

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   if(zone==="Ciudad" || zone==="Ciudad Norte"){

     // 🔥 SISTEMA PRO DE CALLES
     let isStreet = (
       x % CONFIG.ROAD_SPACING === 0 ||
       y % CONFIG.ROAD_SPACING === 0
     );

     let isAvenue = (
       x % CONFIG.AVENUE_SPACING === 0 ||
       y % CONFIG.AVENUE_SPACING === 0
     );

     if(isAvenue){
       map[y][x]=T.ROAD; // avenidas principales
     }
     else if(isStreet){
       map[y][x]=T.ROAD; // calles normales
     }
     else{
       map[y][x]=T.BUILDING;
     }
   }
  }
 }

 /* 🌉 PUENTE EXACTO */
 let startX = lake.x;
 let endX = lake.x + lake.w;

 for(let x=startX; x<endX; x++){
   map[CONFIG.BRIDGE_Y][x]=T.BRIDGE;
   map[CONFIG.BRIDGE_Y+1][x]=T.BRIDGE;
 }

 return map;
}

defineZones();
let city=generateWorld();

/* =========================
   INPUT
========================= */
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   CÁMARA
========================= */
let camX=100*TILE;
let camY=220*TILE;
let speed=5;

let lastTime=performance.now();

function updateCamera(delta){
 if(keys["KeyW"]) camY-=speed*delta;
 if(keys["KeyS"]) camY+=speed*delta;
 if(keys["KeyA"]) camX-=speed*delta;
 if(keys["KeyD"]) camX+=speed*delta;

 camX=Math.round(camX);
 camY=Math.round(camY);

 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

/* =========================
   DATOS
========================= */
let buildingsData={};

function getBuildingData(x,y){
 let key=x+","+y;

 if(!buildingsData[key]){
  let windows=[];
  let h=60+Math.random()*50;
  let style=Math.floor(Math.random()*3);

  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({x:wx,y:wy,on:Math.random()>0.3});
    }
  }

  buildingsData[key]={height:h,windows,style};
 }

 return buildingsData[key];
}

let treesData={};

function hasTree(x,y){
 let key=x+","+y;

 if(!treesData[key]){
  treesData[key]=(getZone(x,y)==="Bosque" && Math.random()>CONFIG.TREE_DENSITY);
 }

 return treesData[key];
}

/* =========================
   DIBUJO
========================= */
function drawTile(x,y,t){
 x=Math.round(x);
 y=Math.round(y);

 if(t===T.ROAD) ctx.fillStyle="#3a3a3a";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";

 ctx.fillRect(x,y,TILE,TILE);

 // 🔥 CALLES PRO 90s
 if(t===T.ROAD){

  // línea central
  ctx.strokeStyle="#d4c76b";
  ctx.lineWidth=2;

  ctx.beginPath();
  ctx.moveTo(x,y+16);
  ctx.lineTo(x+32,y+16);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+16,y);
  ctx.lineTo(x+16,y+32);
  ctx.stroke();

  // desgaste visual
  ctx.strokeStyle="#ffffff08";
  ctx.strokeRect(x,y,32,32);

  ctx.lineWidth=1;
 }

 if(t===T.BRIDGE){
  ctx.strokeStyle="#5c3b1e";

  for(let i=0;i<32;i+=8){
    ctx.beginPath();
    ctx.moveTo(x+i,y);
    ctx.lineTo(x+i,y+32);
    ctx.stroke();
  }

  ctx.strokeStyle="#2b1a0d";
  ctx.beginPath();
  ctx.moveTo(x,y+4);
  ctx.lineTo(x+32,y+4);
  ctx.moveTo(x,y+28);
  ctx.lineTo(x+32,y+28);
  ctx.stroke();
 }
}

function drawBuilding(x,y,worldX,worldY){
 let d=getBuildingData(worldX,worldY);
 let h=d.height;

 x=Math.round(x);
 y=Math.round(y);

 let colors=["#5a4a3f","#4b5a3f","#3f4a5a"];
 ctx.fillStyle=colors[d.style];

 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#222";
 ctx.fillRect(x,y-h,32,4);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#ffd966" : "#1a1a1a";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawTree(x,y){
 x=Math.round(x);
 y=Math.round(y);

 ctx.fillStyle="#4a2f1b";
 ctx.fillRect(x+14,y+20,4,10);

 ctx.fillStyle="#2f7a3f";
 ctx.beginPath();
 ctx.arc(x+16,y+14,9,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle="#255f32";
 ctx.beginPath();
 ctx.arc(x+12,y+14,5,0,Math.PI*2);
 ctx.fill();

 ctx.beginPath();
 ctx.arc(x+20,y+14,5,0,Math.PI*2);
 ctx.fill();
}

/* =========================
   RENDER
========================= */
function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);

 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);

   if(t===T.BUILDING){
    drawBuilding(dx,dy,x,y);
   }

   if(hasTree(x,y)){
    drawTree(dx,dy);
   }
  }
 }

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);

 zoneUI.innerText=getZone(px,py);
}

/* =========================
   LOOP
========================= */
function loop(time){
 let delta=(time-lastTime)/16;
 lastTime=time;

 if(delta>2) delta=1;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateCamera(delta);
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
