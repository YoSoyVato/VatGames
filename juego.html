<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}
</style>
</head>

<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ========================= */
const CONFIG = {
  CITY_WIDTH:90,
  CITY_HEIGHT:120,
  LAKE_SIZE:200,
  TREE_DENSITY:0.85,
  BRIDGE_Y:250,
  SAFE_MARGIN:20,
  TOWN_SIZE:15
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

/* ========================= */
const ZONES=[];

/* 🔥 NUEVOS SISTEMAS */
let time = 0;
let fires = {};

/* ========================= */
function rectsOverlap(a,b){
 return !(
  a.x + a.w + CONFIG.SAFE_MARGIN < b.x ||
  a.x > b.x + b.w + CONFIG.SAFE_MARGIN ||
  a.y + a.h + CONFIG.SAFE_MARGIN < b.y ||
  a.y > b.y + b.h + CONFIG.SAFE_MARGIN
 );
}

function clamp(v,min,max){
 return Math.max(min,Math.min(max,v));
}

/* ========================= ZONES */
function defineZones(){

 ZONES.length=0;

 let lake = {
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 };

 let city1 = {
   name:"Ciudad",
   x: lake.x - CONFIG.CITY_WIDTH - 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 let city2 = {
   name:"Ciudad Norte",
   x: lake.x + lake.w + 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 function fixCity(city){
  while(rectsOverlap(city,lake)){
    city.y += 10;
  }
 }

 fixCity(city1);
 fixCity(city2);

 ZONES.push(city1);
 ZONES.push(city2);
 ZONES.push(lake);

 let roadX = Math.floor(city1.x + city1.w/2);
 let roadX2 = Math.floor(city2.x + city2.w/2);

 for(let i=1;i<=5;i++){
   let yPos = city1.y - i*60;
   ZONES.push({ name:"Pueblo", x: roadX - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }

 for(let i=1;i<=5;i++){
   let yPos = city2.y - i*60;
   ZONES.push({ name:"Pueblo", x: roadX2 - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX2 + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* ========================= WORLD */
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));
 let lake = ZONES.find(z=>z.name==="Lago");
 let city = ZONES.find(z=>z.name==="Ciudad");
 let cityN = ZONES.find(z=>z.name==="Ciudad Norte");

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   if(zone==="Ciudad" || zone==="Ciudad Norte"){
     map[y][x]=T.BUILDING;
   }

   if(zone==="Pueblo"){
     let isRoad = (x % 5 === 0 || y % 5 === 0);
     if(isRoad) map[y][x]=T.ROAD;
     else map[y][x]=T.BUILDING;
   }
  }
 }

 return map;
}

defineZones();
let city=generateWorld();

/* ========================= CAMERA */
let camX=150*TILE;
let camY=200*TILE;
let speed=5;
let lastTime=performance.now();

/* ========================= BUILDINGS */
let buildingsData={};

function getBuildingData(x,y){
 let key=x+","+y;

 if(!buildingsData[key]){
  let h = 60+Math.random()*50;

  let windows=[];
  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({
        x:wx,
        y:wy,
        on:Math.random()>0.5,
        timer:Math.random()*200
      });
    }
  }

  buildingsData[key]={height:h,windows};
 }

 return buildingsData[key];
}

/* ========================= FIRE SYSTEM */
function updateFires(){
 if(Math.random()<0.002){
   let x=Math.floor(Math.random()*WORLD_COLS);
   let y=Math.floor(Math.random()*WORLD_ROWS);

   if(city[y][x]===T.BUILDING){
     fires[x+","+y]={life:200};
   }
 }

 for(let k in fires){
   fires[k].life--;
   if(fires[k].life<=0) delete fires[k];
 }
}

/* ========================= DRAW */
function drawTile(x,y,t,wx,wy){

 if(t===T.WATER){
   let wave = Math.sin((wx+time)*0.3)+Math.cos((wy+time)*0.3);
   let c = 40 + wave*10;
   ctx.fillStyle=`rgb(30,${100+c},180)`;
 }

 else if(t===T.ROAD) ctx.fillStyle="#111";
 else if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 else if(t===T.GRASS) ctx.fillStyle="#355c3a";
 else if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";

 ctx.fillRect(x,y,TILE,TILE);
}

function drawBuilding(x,y,wx,wy){
 let d=getBuildingData(wx,wy);

 ctx.fillStyle="#444";
 ctx.fillRect(x,y-d.height,32,d.height);

 for(let w of d.windows){

   w.timer--;
   if(w.timer<=0){
     w.on=!w.on;
     w.timer=50+Math.random()*200;
   }

   ctx.fillStyle = w.on ? "#ffd966" : "#1a1a1a";
   ctx.fillRect(x+w.x, y-d.height+w.y, 5, 6);
 }

 /* 🔥 FUEGO */
 if(fires[wx+","+wy]){
   let f=fires[wx+","+wy];

   ctx.fillStyle="orange";
   ctx.fillRect(x+8,y-10,16,10);

   ctx.fillStyle="red";
   ctx.fillRect(x+10,y-14,12,8);
 }
}

function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t,x,y);

   if(t===T.BUILDING) drawBuilding(dx,dy,x,y);
  }
 }
}

/* ========================= LOOP */
function loop(timeNow){

 let delta=(timeNow-lastTime)/16;
 lastTime=timeNow;
 time+=0.05;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateFires();
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>
