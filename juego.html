<script>

// 🧠 DATOS PERSISTENTES DE ÁRBOLES (FIX TEMBLOR)
let treesData={};

function hasTree(x,y){
 let key=x+","+y;

 if(!treesData[key]){
  let zone=getZone(x,y);

  treesData[key]={
    exists:(zone==="Exterior"||zone==="Parque") && Math.random()>0.92
  };
 }

 return treesData[key].exists;
}

// 🌍 GENERACIÓN FIX (NO CIUDAD SOBRE AGUA)
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   // 🔥 LAGO PRIORIDAD (NUNCA se pisa)
   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   if(zone==="Ciudad" || zone==="Ciudad Norte"){
     map[y][x]=T.BUILDING;

     if(x%6===0 || y%6===0){
       map[y][x]=T.ROAD;
     }
   }

   if(zone==="Parque"){
     map[y][x]=T.GRASS;
   }
  }
 }

 // 🌉 PUENTE PRO
 let bridgeY = 140;
 for(let x=280;x<400;x++){
   map[bridgeY][x]=T.BRIDGE;
   map[bridgeY+1][x]=T.BRIDGE;
 }

 return map;
}

// 🏢 EDIFICIOS (FIX TEMBLOR)
function drawBuilding(x,y){
 let d=getBuildingData(x,y);
 let h=d.height;

 // 🔥 SNAP PIXEL PERFECT
 x=Math.floor(x);
 y=Math.floor(y);

 ctx.fillStyle="rgba(0,0,0,0.3)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

// 🌳 ÁRBOLES PRO (ESTABLES)
function drawTree(x,y){

 x=Math.floor(x);
 y=Math.floor(y);

 // tronco
 ctx.fillStyle="#5a3e1b";
 ctx.fillRect(x+13,y+20,6,10);

 // hojas base
 ctx.fillStyle="#2ecc71";
 ctx.beginPath();
 ctx.arc(x+16,y+14,10,0,Math.PI*2);
 ctx.fill();

 // volumen
 ctx.fillStyle="#27ae60";
 ctx.beginPath();
 ctx.arc(x+10,y+14,6,0,Math.PI*2);
 ctx.fill();

 ctx.beginPath();
 ctx.arc(x+22,y+14,6,0,Math.PI*2);
 ctx.fill();
}

// 🎨 TILES + PUENTE PRO
function drawTile(x,y,t){

 x=Math.floor(x);
 y=Math.floor(y);

 if(t===T.ROAD) ctx.fillStyle="#2b2f36";
 if(t===T.BUILDING) ctx.fillStyle="#1c222b";
 if(t===T.GRASS) ctx.fillStyle="#1f5f3a";
 if(t===T.WATER) ctx.fillStyle="#1e90ff";
 if(t===T.BRIDGE) ctx.fillStyle="#a9825a";

 ctx.fillRect(x,y,TILE,TILE);

 // 🛣️ calles
 if(t===T.ROAD){
  ctx.strokeStyle="#ffffff55";
  ctx.beginPath();
  ctx.moveTo(x,y+16);
  ctx.lineTo(x+32,y+16);
  ctx.moveTo(x+16,y);
  ctx.lineTo(x+16,y+32);
  ctx.stroke();
 }

 // 🌉 PUENTE PRO (barandas + madera)
 if(t===T.BRIDGE){

  // tablones
  ctx.strokeStyle="#6e4f32";
  for(let i=0;i<32;i+=8){
    ctx.beginPath();
    ctx.moveTo(x+i,y);
    ctx.lineTo(x+i,y+32);
    ctx.stroke();
  }

  // barandas
  ctx.strokeStyle="#3e2c1c";
  ctx.beginPath();
  ctx.moveTo(x,y+4);
  ctx.lineTo(x+32,y+4);
  ctx.moveTo(x,y+28);
  ctx.lineTo(x+32,y+28);
  ctx.stroke();
 }
}

// 🌍 RENDER (FIX ÁRBOLES)
function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }

   // 🌳 FIX → ya no usa random por frame
   if(hasTree(x,y)){
    drawTree(dx,dy);
   }
  }
 }

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);
 zoneUI.innerText=getZone(px,py);
}

</script>
