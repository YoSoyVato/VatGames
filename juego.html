<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (90s FINAL PRO)</title>

<style>
body{margin:0;overflow:hidden;background:#0b0d12}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:#e0e0e0;
 font-family:monospace;
 font-size:18px;
 background:rgba(0,0,0,0.6);
 padding:6px 18px;
 border-radius:8px;
 letter-spacing:2px;
}

/* ========================= */
/* 📅 CALENDARIO MEJORADO */
#calendarUI{
 position:fixed;
 right:20px;
 top:20px;
 width:250px;

 background:
 linear-gradient(
 180deg,
 rgba(25,25,30,0.96),
 rgba(10,10,14,0.96)
 );

 border:
 2px solid rgba(255,255,255,0.08);

 border-radius:18px;

 overflow:hidden;

 z-index:9999;

 color:white;

 font-family:monospace;

 user-select:none;

 box-shadow:
 0 0 30px rgba(0,0,0,0.65),
 inset 0 0 10px rgba(255,255,255,0.03);

 backdrop-filter:blur(4px);
}

#calendarHeader{
 background:
 linear-gradient(
 90deg,
 #6d1010,
 #aa1b1b
 );

 padding:12px;

 text-align:center;

 font-size:15px;

 letter-spacing:2px;

 border-bottom:
 1px solid rgba(255,255,255,0.08);
}

#calendarMonth{
 padding-top:22px;

 text-align:center;

 font-size:34px;

 font-weight:bold;

 color:#ffd966;

 cursor:pointer;

 transition:0.2s;

 text-shadow:
 0 0 15px rgba(255,217,102,0.4);
}

#calendarMonth:hover{
 transform:scale(1.03);
}

#calendarDate{
 text-align:center;
 padding-top:8px;
 font-size:13px;
 color:#aaa;
 letter-spacing:1px;
}

#calendarTime{
 padding:20px;

 text-align:center;

 font-size:42px;

 color:white;

 text-shadow:
 0 0 20px rgba(255,255,255,0.25);
}

#calendarState{
 border-top:
 1px solid rgba(255,255,255,0.06);

 padding:12px;

 text-align:center;

 font-size:14px;

 background:
 rgba(255,255,255,0.03);

 letter-spacing:1px;
}

#calendarProgress{
 width:100%;
 height:6px;
 background:rgba(255,255,255,0.05);
}

#calendarProgressBar{
 width:0%;
 height:100%;

 background:
 linear-gradient(
 90deg,
 #ffd966,
 #ff9f43
 );

 transition:0.2s;
}
</style>
</head>

<body>

<div id="zoneName">Zona</div>

<!-- 📅 CALENDARIO -->
<div id="calendarUI">

  <div id="calendarHeader">
    DETROIT POLICE DEPARTMENT
  </div>

  <div id="calendarMonth">
    Enero
  </div>

  <div id="calendarDate">
    Año 1990
  </div>

  <div id="calendarTime">
    08:00
  </div>

  <div id="calendarState">
    ☀️ Día
  </div>

  <div id="calendarProgress">
    <div id="calendarProgressBar"></div>
  </div>

</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

/* 📅 UI */
const calendarHeader=document.getElementById("calendarHeader");
const calendarMonth=document.getElementById("calendarMonth");
const calendarDate=document.getElementById("calendarDate");
const calendarTime=document.getElementById("calendarTime");
const calendarState=document.getElementById("calendarState");
const calendarProgressBar=document.getElementById("calendarProgressBar");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ========================= */
/* 📅 SISTEMA TIEMPO */

let gameYear = 1990;
let gameMonth = 0;
let gameHour = 8;

/*
🔥 ciclos:
3 ciclos = 1 mes
*/

let cycleCount = 0;

/*
☀️ estados:
day
night
transition
*/

let timeState = "day";

const MONTHS = [
 "Enero",
 "Febrero",
 "Marzo",
 "Abril",
 "Mayo",
 "Junio",
 "Julio",
 "Agosto",
 "Septiembre",
 "Octubre",
 "Noviembre",
 "Diciembre"
];

/*
🔥 TIEMPOS

☀️ día = 5 minutos
🌙 noche = 3 minutos

3 ciclos:
24 minutos

+1 minuto transición
= 25 minutos año
*/

const DAY_DURATION_REAL = 300;
const NIGHT_DURATION_REAL = 180;
const TRANSITION_DURATION = 60;

let timeTimer = 0;

function updateTime(delta){

 timeTimer += delta / 60;

 /*
 ☀️ DÍA
 */

 if(timeState==="day"){

   let progress =
   timeTimer / DAY_DURATION_REAL;

   gameHour =
   6 + (progress * 12);

   if(timeTimer >= DAY_DURATION_REAL){

     timeTimer = 0;
     timeState = "night";

   }

 }

 /*
 🌙 NOCHE
 */

 else if(timeState==="night"){

   let progress =
   timeTimer / NIGHT_DURATION_REAL;

   gameHour =
   18 + (progress * 12);

   if(gameHour >= 24){
     gameHour -= 24;
   }

   if(timeTimer >= NIGHT_DURATION_REAL){

     timeTimer = 0;

     cycleCount++;

     /*
     🔥 cada 3 ciclos
     cambia mes
     */

     if(cycleCount >= 3){

       cycleCount = 0;

       gameMonth++;

       /*
       📅 nuevo año
       */

       if(gameMonth >= 12){

         gameMonth = 0;
         gameYear++;

       }

       timeState = "transition";

     } else {

       timeState = "day";

     }

   }

 }

 /*
 🌅 TRANSICIÓN
 */

 else if(timeState==="transition"){

   gameHour = 5;

   if(timeTimer >= TRANSITION_DURATION){

     timeTimer = 0;
     timeState = "day";

   }

 }

 updateCalendar();
}

function getMonthName(){

 return MONTHS[gameMonth];

}

function getFormattedTime(){

 let h=Math.floor(gameHour);
 let m=Math.floor((gameHour-h)*60);

 if(h<10) h="0"+h;
 if(m<10) m="0"+m;

 return h+":"+m;
}

function updateCalendar(){

 calendarHeader.innerText =
 "DETROIT POLICE - " + gameYear;

 calendarMonth.innerText =
 getMonthName();

 calendarDate.innerText =
 "Año " + gameYear +
 " • Ciclo " +
 (cycleCount+1) +
 "/3";

 calendarTime.innerText =
 getFormattedTime();

 /*
 🌙 estado
 */

 if(timeState==="day"){

   calendarState.innerText =
   "☀️ Día";

 }

 else if(timeState==="night"){

   calendarState.innerText =
   "🌙 Noche";

 }

 else {

   calendarState.innerText =
   "🌅 Amanecer";

 }

 /*
 📊 barra progreso
 */

 let maxTime =
 timeState==="day"
 ? DAY_DURATION_REAL
 : timeState==="night"
 ? NIGHT_DURATION_REAL
 : TRANSITION_DURATION;

 let progress =
 (timeTimer / maxTime) * 100;

 calendarProgressBar.style.width =
 progress + "%";
}

calendarMonth.addEventListener("click",()=>{

 alert(
  "📅 " + getMonthName() +
  "\n📆 Año: " + gameYear +
  "\n🕒 Hora: " + getFormattedTime() +
  "\n🔄 Ciclos: " +
  cycleCount + "/3"
 );

});

/* ========================= */
const CONFIG = {
  CITY_WIDTH:90,
  CITY_HEIGHT:120,
  LAKE_SIZE:200,
  TREE_DENSITY:0.85,
  BRIDGE_Y:250,
  SAFE_MARGIN:20,
  TOWN_SIZE:15
};

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

const T={ROAD:0,BUILDING:1,GRASS:2,WATER:3,BRIDGE:4};

/* ========================= */
const ZONES=[];

function rectsOverlap(a,b){
 return !(
  a.x + a.w + CONFIG.SAFE_MARGIN < b.x ||
  a.x > b.x + b.w + CONFIG.SAFE_MARGIN ||
  a.y + a.h + CONFIG.SAFE_MARGIN < b.y ||
  a.y > b.y + b.h + CONFIG.SAFE_MARGIN
 );
}

function clamp(v,min,max){
 return Math.max(min,Math.min(max,v));
}

function defineZones(){

 ZONES.length=0;

 let lake = {
   name:"Lago",
   x:150,
   y:150,
   w:CONFIG.LAKE_SIZE,
   h:CONFIG.LAKE_SIZE
 };

 let city1 = {
   name:"Ciudad",
   x: lake.x - CONFIG.CITY_WIDTH - 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 let city2 = {
   name:"Ciudad Norte",
   x: lake.x + lake.w + 10,
   y: CONFIG.BRIDGE_Y - CONFIG.CITY_HEIGHT/2,
   w: CONFIG.CITY_WIDTH,
   h: CONFIG.CITY_HEIGHT
 };

 function fixCity(city){
  while(rectsOverlap(city,lake)){
    city.y += 10;
  }
 }

 fixCity(city1);
 fixCity(city2);

 ZONES.push(city1);
 ZONES.push(city2);
 ZONES.push(lake);

 let roadX = Math.floor(city1.x + city1.w/2);
 let roadX2 = Math.floor(city2.x + city2.w/2);

 for(let i=1;i<=5;i++){
   let yPos = city1.y - i*60;

   ZONES.push({ name:"Pueblo", x: roadX - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }

 for(let i=1;i<=5;i++){
   let yPos = city2.y - i*60;

   ZONES.push({ name:"Pueblo", x: roadX2 - 40, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
   ZONES.push({ name:"Pueblo", x: roadX2 + 25, y: yPos, w: CONFIG.TOWN_SIZE, h: CONFIG.TOWN_SIZE });
 }
}

function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* ========================= */
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));
 let lake = ZONES.find(z=>z.name==="Lago");
 let city = ZONES.find(z=>z.name==="Ciudad");
 let cityN = ZONES.find(z=>z.name==="Ciudad Norte");

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   if(zone==="Ciudad" || zone==="Ciudad Norte"){
     map[y][x]=T.BUILDING;
   }

   if(zone==="Pueblo"){
     let isRoad = (x % 5 === 0 || y % 5 === 0);
     if(isRoad) map[y][x]=T.ROAD;
     else map[y][x]=T.BUILDING;
   }
  }
 }

 for(let x=lake.x; x<lake.x+lake.w; x++){
   for(let i=-1;i<=1;i++){
     let yy = clamp(CONFIG.BRIDGE_Y+i,0,WORLD_ROWS-1);
     map[yy][x]=T.BRIDGE;
   }
 }

 let roadX = Math.floor(city.x + city.w/2);
 let roadX2 = Math.floor(cityN.x + cityN.w/2);

 for(let y=0;y<city.y;y++){
   for(let i=-1;i<=1;i++){
     let xx = clamp(roadX+i,0,WORLD_COLS-1);
     map[y][xx]=T.ROAD;
   }
 }

 for(let y=0;y<cityN.y;y++){
   for(let i=-1;i<=1;i++){
     let xx = clamp(roadX2+i,0,WORLD_COLS-1);
     map[y][xx]=T.ROAD;
   }
 }

 for(let y=city.y; y<city.y+city.h; y++){
   for(let i=-1;i<=1;i++){
     map[y][roadX+i]=T.ROAD;
   }
 }

 for(let y=cityN.y; y<cityN.y+cityN.h; y++){
   for(let i=-1;i<=1;i++){
     map[y][roadX2+i]=T.ROAD;
   }
 }

 for(let x=roadX; x<lake.x; x++){
   for(let i=-1;i<=1;i++){
     let yy = clamp(CONFIG.BRIDGE_Y+i,0,WORLD_ROWS-1);
     map[yy][x]=T.ROAD;
   }
 }

 /* ========================= */
 /* 🛣️ NUEVA RUTA LADO NORTE */

 for(let x=lake.x + lake.w; x<roadX2; x++){
   for(let i=-1;i<=1;i++){

     let yy = clamp(
       CONFIG.BRIDGE_Y+i,
       0,
       WORLD_ROWS-1
     );

     map[yy][x]=T.ROAD;
   }
 }

 /* salida larga hacia bosque */

 for(let x=roadX2; x<roadX2+120; x++){
   for(let i=-1;i<=1;i++){

     let yy = clamp(
       CONFIG.BRIDGE_Y+i,
       0,
       WORLD_ROWS-1
     );

     map[yy][x]=T.ROAD;
   }
 }

 for(let z of ZONES){
   if(z.name==="Pueblo"){
     let cy = Math.floor(z.y + z.h/2);
     let cx = Math.floor(z.x + z.w/2);

     let nearestRoad = (cx < WORLD_COLS/2) ? roadX : roadX2;

     for(let x=Math.min(cx,nearestRoad); x<=Math.max(cx,nearestRoad); x++){
       for(let i=-1;i<=1;i++){
         let yy = clamp(cy+i,0,WORLD_ROWS-1);
         map[yy][x]=T.ROAD;
       }
     }
   }
 }

 return map;
}

defineZones();
let city=generateWorld();

/* ========================= DIA / NOCHE ========================= */
let dayTime = 0;
const DAY_DURATION = 300;

function updateDayNight(delta){
  dayTime += delta / 60;
  if(dayTime > DAY_DURATION) dayTime = 0;
}

function getLightLevel(){

  let normalized = gameHour / 24;

  return Math.sin(normalized * Math.PI * 2 - Math.PI/2)
  * 0.5 + 0.5;
}

/* 🔦 MOUSE */
let mouseX = canvas.width/2;
let mouseY = canvas.height/2;

canvas.addEventListener("mousemove",e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

/* ========================= INPUT */
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

/* ========================= CÁMARA */
let camX=150*TILE;
let camY=200*TILE;
let speed=5;
let lastTime=performance.now();

function updateCamera(delta){
 let currentSpeed = (keys["ShiftLeft"] || keys["ShiftRight"]) ? speed*2 : speed;
 if(keys["KeyW"]) camY-=currentSpeed*delta;
 if(keys["KeyS"]) camY+=currentSpeed*delta;
 if(keys["KeyA"]) camX-=currentSpeed*delta;
 if(keys["KeyD"]) camX+=currentSpeed*delta;
 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

/* ========================= RESTO IGUAL */
let buildingsData={};

function getBuildingData(x,y){
 let key=x+","+y;
 if(!buildingsData[key]){
  let zone=getZone(x,y);
  let h = zone==="Pueblo" ? 20+Math.random()*10 : 60+Math.random()*50;
  let windows=[];
  let style=Math.floor(Math.random()*3);

  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({
        x:wx,
        y:wy,
        on:true,
        sleepTimer:Math.random()*200
      });
    }
  }

  buildingsData[key]={height:h,windows,style};
 }
 return buildingsData[key];
}

/* 🔥 SISTEMA REALISTA DE SUEÑO */
function updateWindows(){
 let light = getLightLevel();

 for(let k in buildingsData){
   let b=buildingsData[k];
   for(let w of b.windows){

     if(light < 0.35){
       w.sleepTimer -= 0.3;

       if(w.sleepTimer <= 0){
         w.on = false;
       }

     } else {

       if(Math.random()<0.01){
         w.on = !w.on;
       }

       w.sleepTimer = 100 + Math.random()*200;
     }

   }
 }
}

let treesData={};

function hasTree(x,y){
 let key=x+","+y;
 if(!treesData[key]){
   let tile = city[y]?.[x];
   treesData[key]=(
     getZone(x,y)==="Bosque" &&
     tile!==T.ROAD &&
     tile!==T.BRIDGE &&
     Math.random()>CONFIG.TREE_DENSITY
   );
 }
 return treesData[key];
}

function drawTile(x,y,t){
 if(t===T.ROAD) ctx.fillStyle="#111";
 if(t===T.BUILDING) ctx.fillStyle="#2a2a2a";
 if(t===T.GRASS) ctx.fillStyle="#355c3a";
 if(t===T.WATER) ctx.fillStyle="#2c6fa3";
 if(t===T.BRIDGE) ctx.fillStyle="#8b6b4a";

 ctx.fillRect(x,y,TILE,TILE);
}

function drawBuilding(x,y,wx,wy){
 let d=getBuildingData(wx,wy);
 let h=d.height;
 let zone=getZone(wx,wy);

 let colors = zone==="Pueblo"
   ? ["#7a5a3f","#8b6b4a","#6b4f3a"]
   : ["#5a4a3f","#4b5a3f","#3f4a5a"];

 ctx.fillStyle=colors[d.style];
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#222";
 ctx.fillRect(x,y-h,32,4);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#ffd966" : "#000000";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawTree(x,y){
 ctx.fillStyle="#4a2f1b";
 ctx.fillRect(x+14,y+20,4,10);

 ctx.fillStyle="#2f7a3f";
 ctx.beginPath();
 ctx.arc(x+16,y+14,9,0,Math.PI*2);
 ctx.fill();
}

function drawWorld(){
 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);

   if(t===T.BUILDING) drawBuilding(dx,dy,x,y);
   if(hasTree(x,y)) drawTree(dx,dy);
  }
 }

 let darkness = 1 - getLightLevel();
 ctx.fillStyle = `rgba(0,0,0,${darkness * 0.7})`;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(darkness > 0.2){
   ctx.globalCompositeOperation = "lighter";

   let gradient = ctx.createRadialGradient(mouseX,mouseY,10,mouseX,mouseY,140);
   gradient.addColorStop(0,"rgba(255,255,255,0.25)");
   gradient.addColorStop(1,"rgba(255,255,255,0)");

   ctx.fillStyle = gradient;
   ctx.beginPath();
   ctx.arc(mouseX,mouseY,140,0,Math.PI*2);
   ctx.fill();

   ctx.globalCompositeOperation = "source-over";
 }

 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);
 zoneUI.innerText=getZone(px,py);
}

function loop(timeNow){
 let delta=(timeNow-lastTime)/16;
 lastTime=timeNow;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateCamera(delta);

 /* 📅 TIEMPO */
 updateTime(delta);

 updateDayNight(delta);
 updateWindows();
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
 
<script src="killers.js"></script>
 
</body>
</html>
