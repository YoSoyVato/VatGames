<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (Calles Centrales + WASD)</title>
<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;

// MAPA MÁS GRANDE (para moverte)
const WORLD_ROWS=200;
const WORLD_COLS=200;

const T={ROAD:0,BUILDING:1};

// 🔥 GENERACIÓN MEJORADA (calles centrales + separación)
function generateCity(){
 let map=[];

 for(let y=0;y<WORLD_ROWS;y++){
  let row=[];
  for(let x=0;x<WORLD_COLS;x++){

   // Calles principales
   if(x%8===0 || y%8===0){
     row.push(T.ROAD);
   }
   // Calles secundarias
   else if(x%4===0 || y%4===0){
     row.push(Math.random()>0.4 ? T.ROAD : T.BUILDING);
   }
   // 🔥 CALLES HORIZONTALES COMO LAS MARCADAS (centrales)
   else if(y%16===0){
     row.push(T.ROAD);
   }
   else{
     row.push(T.BUILDING);
   }

  }
  map.push(row);
 }

 // 🧠 LIMPIEZA: evitar edificios pegados a calles (buffer)
 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){
    if(map[y][x]===T.ROAD){
      if(map[y+1]?.[x]===T.BUILDING) map[y+1][x]=T.ROAD;
      if(map[y-1]?.[x]===T.BUILDING) map[y-1][x]=T.ROAD;
      if(map[y]?.[x+1]===T.BUILDING) map[y][x+1]=T.ROAD;
      if(map[y]?.[x-1]===T.BUILDING) map[y][x-1]=T.ROAD;
    }
  }
 }

 return map;
}

let city=generateCity();

// 🎮 CÁMARA (WASD)
let camX=0;
let camY=0;
let speed=6;
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function updateCamera(){
 if(keys["w"]) camY-=speed;
 if(keys["s"]) camY+=speed;
 if(keys["a"]) camX-=speed;
 if(keys["d"]) camX+=speed;
}

// Datos persistentes
let buildingsData = {};

function getBuildingData(x,y){
 let key = x+","+y;
 if(!buildingsData[key]){
  let windows = [];
  let h = 70 + Math.random()*40;

  for(let wy=10; wy<h-10; wy+=12){
    for(let wx=6; wx<26; wx+=10){
      windows.push({
        x: wx,
        y: wy,
        on: Math.random()>0.2
      });
    }
  }

  buildingsData[key] = { height:h, windows:windows };
 }
 return buildingsData[key];
}

// CALLES
function drawGround(x,y,t,gridX,gridY){
 if(t===T.ROAD){
  ctx.fillStyle="#2b2f36";
  ctx.fillRect(x,y,TILE,TILE);

  ctx.strokeStyle="#777";
  ctx.lineWidth=2;

  let up = city[gridY-1]?.[gridX]===T.ROAD;
  let down = city[gridY+1]?.[gridX]===T.ROAD;
  let left = city[gridY]?.[gridX-1]===T.ROAD;
  let right = city[gridY]?.[gridX+1]===T.ROAD;

  ctx.beginPath();

  if(left && right){
    ctx.moveTo(x,y+16);
    ctx.lineTo(x+32,y+16);
  }

  if(up && down){
    ctx.moveTo(x+16,y);
    ctx.lineTo(x+16,y+32);
  }

  ctx.stroke();
 }

 if(t===T.BUILDING){
  ctx.fillStyle="#1c222b";
  ctx.fillRect(x,y,TILE,TILE);
 }
}

function drawBuilding(x,y){
 let data = getBuildingData(x,y);
 let h = data.height;

 ctx.fillStyle="rgba(0,0,0,0.35)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 ctx.fillStyle="#962d22";
 ctx.fillRect(x+28,y-h,4,h);

 for(let w of data.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawCity(){
 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);

 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE)-camX;
   let dy=(y*TILE)-camY;

   drawGround(dx,dy,t,x,y);
  }
 }

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){
   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE)-camX;
   let dy=(y*TILE)-camY;

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }
  }
 }
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 updateCamera();
 drawCity();
 requestAnimationFrame(loop);
}

loop();

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
