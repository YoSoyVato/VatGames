<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (MAPA DEFINITIVO)</title>

<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}

#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:white;
 font-family:Arial;
 font-size:20px;
 background:rgba(0,0,0,0.5);
 padding:5px 15px;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   CONFIGURACIÓN GENERAL
========================= */
const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

/*
TIPOS DE TERRENO
Puedes agregar más si quieres (ej: arena, nieve, etc)
*/
const T={
 ROAD:0,
 BUILDING:1,
 GRASS:2,
 WATER:3,
 BRIDGE:4
};

/* =========================
   ZONAS DEL MAPA
========================= */
/*
EDITA ESTO para cambiar el mapa fácilmente
(x, y = posición)
(w, h = tamaño)
*/
const ZONES=[];

function defineZones(){

 // 🏙️ Ciudad 1 (100x100)
 ZONES.push({name:"Ciudad", x:80, y:200, w:100, h:100});

 // 🏙️ Ciudad 2 (100x100)
 ZONES.push({name:"Ciudad Norte", x:320, y:200, w:100, h:100});

 // 🌊 Lago (200x200)
 ZONES.push({name:"Lago", x:150, y:150, w:200, h:200});
}

/*
Detecta en qué zona estás
*/
function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Bosque";
}

/* =========================
   GENERACIÓN DEL MUNDO
========================= */
function generateWorld(){

 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   // 🌊 LAGO (prioridad máxima)
   if(zone==="Lago"){
     map[y][x]=T.WATER;
     continue;
   }

   // 🏙️ CIUDADES
   if(zone==="Ciudad" || zone==="Ciudad Norte"){

     map[y][x]=T.BUILDING;

     // Calles
     if(x%6===0 || y%6===0){
       map[y][x]=T.ROAD;
     }
   }
  }
 }

 /* =========================
    🌉 PUENTE (EDITABLE)
 ========================= */
 /*
  Cambia bridgeY para subir/bajar el puente
 */
 let bridgeY = 250;

 for(let x=150;x<350;x++){
   map[bridgeY][x]=T.BRIDGE;
   map[bridgeY+1][x]=T.BRIDGE;
 }

 return map;
}

defineZones();
let city=generateWorld();

/* =========================
   INPUT (WASD)
========================= */
let keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   CÁMARA
========================= */
let camX=100*TILE;
let camY=220*TILE;
let speed=5;

let lastTime=performance.now();

function updateCamera(delta){

 if(keys["KeyW"]) camY-=speed*delta;
 if(keys["KeyS"]) camY+=speed*delta;
 if(keys["KeyA"]) camX-=speed*delta;
 if(keys["KeyD"]) camX+=speed*delta;

 // 🔥 evita temblores
 camX=Math.round(camX);
 camY=Math.round(camY);

 // límites del mundo
 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

/* =========================
   DATOS PERSISTENTES
========================= */

// 🏢 edificios
let buildingsData={};

function getBuildingData(x,y){
 let key=x+","+y;

 if(!buildingsData[key]){
  let windows=[];
  let h=60+Math.random()*40;

  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({x:wx,y:wy,on:Math.random()>0.2});
    }
  }

  buildingsData[key]={height:h,windows};
 }

 return buildingsData[key];
}

// 🌳 árboles (NO se regeneran cada frame)
let treesData={};

function hasTree(x,y){
 let key=x+","+y;

 if(!treesData[key]){
  let zone=getZone(x,y);

  treesData[key]={
    exists:(zone==="Bosque") && Math.random()>0.85
  };
 }

 return treesData[key].exists;
}

/* =========================
   DIBUJO
========================= */

function drawTile(x,y,t){

 x=Math.round(x);
 y=Math.round(y);

 if(t===T.ROAD) ctx.fillStyle="#2b2f36";
 if(t===T.BUILDING) ctx.fillStyle="#1c222b";
 if(t===T.GRASS) ctx.fillStyle="#1f5f3a";
 if(t===T.WATER) ctx.fillStyle="#1e90ff";
 if(t===T.BRIDGE) ctx.fillStyle="#a9825a";

 ctx.fillRect(x,y,TILE,TILE);

 // calles
 if(t===T.ROAD){
  ctx.strokeStyle="#ffffff55";
  ctx.beginPath();
  ctx.moveTo(x,y+16);
  ctx.lineTo(x+32,y+16);
  ctx.moveTo(x+16,y);
  ctx.lineTo(x+16,y+32);
  ctx.stroke();
 }

 // puente mejorado
 if(t===T.BRIDGE){

  // tablones
  ctx.strokeStyle="#6e4f32";
  for(let i=0;i<32;i+=8){
    ctx.beginPath();
    ctx.moveTo(x+i,y);
    ctx.lineTo(x+i,y+32);
    ctx.stroke();
  }

  // barandas
  ctx.strokeStyle="#3e2c1c";
  ctx.beginPath();
  ctx.moveTo(x,y+4);
  ctx.lineTo(x+32,y+4);
  ctx.moveTo(x,y+28);
  ctx.lineTo(x+32,y+28);
  ctx.stroke();
 }
}

function drawBuilding(x,y){

 let d=getBuildingData(x,y);
 let h=d.height;

 x=Math.round(x);
 y=Math.round(y);

 ctx.fillStyle="rgba(0,0,0,0.3)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

function drawTree(x,y){

 x=Math.round(x);
 y=Math.round(y);

 // tronco
 ctx.fillStyle="#5a3e1b";
 ctx.fillRect(x+13,y+20,6,10);

 // hojas
 ctx.fillStyle="#2ecc71";
 ctx.beginPath();
 ctx.arc(x+16,y+14,10,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle="#27ae60";
 ctx.beginPath();
 ctx.arc(x+10,y+14,6,0,Math.PI*2);
 ctx.fill();

 ctx.beginPath();
 ctx.arc(x+22,y+14,6,0,Math.PI*2);
 ctx.fill();
}

/* =========================
   RENDER
========================= */
function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);

 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=(x*TILE-camX);
   let dy=(y*TILE-camY);

   drawTile(dx,dy,t);

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }

   if(hasTree(x,y)){
    drawTree(dx,dy);
   }
  }
 }

 // texto zona
 let px=Math.floor((camX+canvas.width/2)/TILE);
 let py=Math.floor((camY+canvas.height/2)/TILE);

 zoneUI.innerText=getZone(px,py);
}

/* =========================
   LOOP
========================= */
function loop(time){

 let delta=(time-lastTime)/16;
 lastTime=time;

 if(delta>2) delta=1;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 updateCamera(delta);
 drawWorld();

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

/* =========================
   RESIZE
========================= */
window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
