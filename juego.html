<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detroit PRO 2D (Mapa con Zonas)</title>
<style>
body{margin:0;overflow:hidden;background:#0e1116}
canvas{display:block}
#zoneName{
 position:fixed;
 top:10px;
 left:50%;
 transform:translateX(-50%);
 color:white;
 font-family:Arial;
 font-size:20px;
 background:rgba(0,0,0,0.5);
 padding:5px 15px;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="zoneName">Zona</div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const zoneUI=document.getElementById("zoneName");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const TILE=32;
const WORLD_ROWS=500;
const WORLD_COLS=500;

// Tipos
const T={
 ROAD:0,
 BUILDING:1,
 GRASS:2,
 WATER:3
};

// ZONAS
const ZONES=[];

// Crear zonas manuales (DISEÑO PRO)
function defineZones(){
 ZONES.push({name:"Ciudad", x:100,y:100,w:300,h:300});
 ZONES.push({name:"Parque", x:50,y:50,w:80,h:80});
 ZONES.push({name:"Lago", x:350,y:50,w:100,h:100});
 ZONES.push({name:"Suburbio", x:0,y:300,w:150,h:200});
}

// Saber zona actual
function getZone(x,y){
 for(let z of ZONES){
  if(x>=z.x && x<z.x+z.w && y>=z.y && y<z.y+z.h){
    return z.name;
  }
 }
 return "Exterior";
}

// GENERACIÓN GLOBAL
function generateWorld(){
 let map = Array.from({length:WORLD_ROWS},()=>Array(WORLD_COLS).fill(T.GRASS));

 for(let y=0;y<WORLD_ROWS;y++){
  for(let x=0;x<WORLD_COLS;x++){

   let zone=getZone(x,y);

   if(zone==="Ciudad"){
     map[y][x]=T.BUILDING;

     // calles
     if(x%8===0 || y%8===0){
       map[y][x]=T.ROAD;
     }
   }

   if(zone==="Suburbio"){
     map[y][x]=Math.random()>0.3 ? T.BUILDING : T.GRASS;

     if(x%10===0 || y%10===0){
       map[y][x]=T.ROAD;
     }
   }

   if(zone==="Parque"){
     map[y][x]=T.GRASS;
   }

   if(zone==="Lago"){
     map[y][x]=T.WATER;
   }

  }
 }

 return map;
}

defineZones();
let city=generateWorld();

// CÁMARA
let camX=0, camY=0;
let speed=6;
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function updateCamera(){
 if(keys["w"]) camY-=speed;
 if(keys["s"]) camY+=speed;
 if(keys["a"]) camX-=speed;
 if(keys["d"]) camX+=speed;

 camX=Math.floor(camX);
 camY=Math.floor(camY);

 // límites del mapa
 camX=Math.max(0,Math.min(camX,(WORLD_COLS*TILE)-canvas.width));
 camY=Math.max(0,Math.min(camY,(WORLD_ROWS*TILE)-canvas.height));
}

// EDIFICIOS
let buildingsData={};
function getBuildingData(x,y){
 let key=x+","+y;
 if(!buildingsData[key]){
  let windows=[];
  let h=70+Math.random()*40;

  for(let wy=10;wy<h-10;wy+=12){
    for(let wx=6;wx<26;wx+=10){
      windows.push({x:wx,y:wy,on:Math.random()>0.2});
    }
  }

  buildingsData[key]={height:h,windows};
 }
 return buildingsData[key];
}

// DIBUJO
function drawTile(x,y,t,gx,gy){

 if(t===T.ROAD){
  ctx.fillStyle="#2b2f36";
 }

 if(t===T.BUILDING){
  ctx.fillStyle="#1c222b";
 }

 if(t===T.GRASS){
  ctx.fillStyle="#1f5f3a";
 }

 if(t===T.WATER){
  ctx.fillStyle="#1e90ff";
 }

 ctx.fillRect(x,y,TILE,TILE);

 // líneas de calle
 if(t===T.ROAD){
  ctx.strokeStyle="#aaa";
  ctx.beginPath();
  ctx.moveTo(x,y+16);
  ctx.lineTo(x+32,y+16);
  ctx.moveTo(x+16,y);
  ctx.lineTo(x+16,y+32);
  ctx.stroke();
 }
}

function drawBuilding(x,y){
 let d=getBuildingData(x,y);
 let h=d.height;

 ctx.fillStyle="rgba(0,0,0,0.3)";
 ctx.fillRect(x+5,y-h+5,32,h);

 ctx.fillStyle="#c0392b";
 ctx.fillRect(x,y-h,32,h);

 ctx.fillStyle="#ecf0f1";
 ctx.fillRect(x,y-h,32,6);

 for(let w of d.windows){
  ctx.fillStyle = w.on ? "#f7dc6f" : "#2c3e50";
  ctx.fillRect(x+w.x, y-h+w.y, 5, 6);
 }
}

// RENDER
function drawWorld(){

 let startCol=Math.floor(camX/TILE);
 let startRow=Math.floor(camY/TILE);
 let endCol=startCol+Math.ceil(canvas.width/TILE)+2;
 let endRow=startRow+Math.ceil(canvas.height/TILE)+2;

 for(let y=startRow;y<endRow;y++){
  for(let x=startCol;x<endCol;x++){

   let t=city[y]?.[x];
   if(t===undefined) continue;

   let dx=Math.floor(x*TILE-camX);
   let dy=Math.floor(y*TILE-camY);

   drawTile(dx,dy,t,x,y);

   if(t===T.BUILDING){
    drawBuilding(dx,dy);
   }
  }
 }

 // zona actual
 let playerTileX=Math.floor((camX+canvas.width/2)/TILE);
 let playerTileY=Math.floor((camY+canvas.height/2)/TILE);
 zoneUI.innerText=getZone(playerTileX,playerTileY);
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 updateCamera();
 drawWorld();
 requestAnimationFrame(loop);
}

loop();

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>
</body>
</html>
