<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detroit 2D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      margin: auto;
      background: #1a1a1a;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Tamaño de tiles
const TILE_SIZE = 32;
const ROWS = Math.floor(canvas.height / TILE_SIZE);
const COLS = Math.floor(canvas.width / TILE_SIZE);

// Tipos de terreno
const TILE = {
  ROAD: 0,
  BUILDING: 1,
  PARK: 2,
  WATER: 3
};

// Generar ciudad procedural
function generateCity() {
  let map = [];

  for (let y = 0; y < ROWS; y++) {
    let row = [];
    for (let x = 0; x < COLS; x++) {
      // Calles principales
      if (x % 6 === 0 || y % 6 === 0) {
        row.push(TILE.ROAD);
      } else {
        // Zonas
        let rand = Math.random();
        if (rand < 0.7) row.push(TILE.BUILDING);
        else if (rand < 0.85) row.push(TILE.PARK);
        else row.push(TILE.WATER);
      }
    }
    map.push(row);
  }

  return map;
}

let cityMap = generateCity();

// Dibujar ciudad
function drawCity() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let tile = cityMap[y][x];

      switch(tile) {
        case TILE.ROAD:
          ctx.fillStyle = "#444";
          break;
        case TILE.BUILDING:
          ctx.fillStyle = "#2c3e50";
          break;
        case TILE.PARK:
          ctx.fillStyle = "#2ecc71";
          break;
        case TILE.WATER:
          ctx.fillStyle = "#3498db";
          break;
      }

      ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
    }
  }
}

// Detalles de edificios
function drawDetails() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (cityMap[y][x] === TILE.BUILDING) {
        ctx.fillStyle = "#ecf0f1";
        ctx.fillRect(x * TILE_SIZE + 8, y * TILE_SIZE + 8, 6, 6);
        ctx.fillRect(x * TILE_SIZE + 18, y * TILE_SIZE + 8, 6, 6);
      }
    }
  }
}

// Loop principal
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCity();
  drawDetails();

  requestAnimationFrame(gameLoop);
}

// Resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Start
gameLoop();
</script>
</body>
</html>
