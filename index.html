<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro City Simulator - Top-Down</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #111; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: #222; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px;
            border: 1px solid #444; pointer-events: none;
        }
        h3 { color: #00ffcc; margin-bottom: 5px; }
        kbd { background: #444; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>CONTROLES</h3>
        <p><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> : Moverse / Manejar</p>
        <p><kbd>E</kbd> : Entrar / Salir del Vehículo</p>
        <hr style="margin: 8px 0; border-color: #333;">
        <p id="status">Estado: A pie</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Ajustar pantalla
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// CONFIGURACIÓN DEL MUNDO
const WORLD_SIZE = 3000;
const GRID_SIZE = 300; // Tamaño de cada manzana de edificios

// Teclado
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// CLASE VEHÍCULO
class Vehicle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.width = 60;
        this.height = 30;
        this.color = color;
        this.angle = 0;
        this.speed = 0;
        this.maxSpeed = 8;
        this.acc = 0.15;
        this.friction = 0.05;
        this.isOccupied = false;
    }

    update() {
        if (this.isOccupied) {
            // Controles de manejo
            if (keys['w']) this.speed = Math.min(this.speed + this.acc, this.maxSpeed);
            if (keys['s']) this.speed = Math.max(this.speed - this.acc, -this.maxSpeed/2);
            
            // Solo gira si se está moviendo
            if (Math.abs(this.speed) > 0.5) {
                const turnSpeed = 0.04 * (this.speed > 0 ? 1 : -1);
                if (keys['a']) this.angle -= turnSpeed;
                if (keys['d']) this.angle += turnSpeed;
            }
        }

        // Aplicar fricción natural
        if (!keys['w'] && !keys['s']) {
            if (this.speed > 0) this.speed = Math.max(this.speed - this.friction, 0);
            if (this.speed < 0) this.speed = Math.min(this.speed + this.friction, 0);
        }

        // Mover basado en el ángulo
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
    }

    draw(cameraX, cameraY) {
        ctx.save();
        ctx.translate(this.x - cameraX, this.y - cameraY);
        ctx.rotate(this.angle);

        // Chasis del Auto
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);

        // Parabrisas / Ventanas
        ctx.fillStyle = "#33aaff";
        ctx.fillRect(10, -this.height/2 + 3, 8, this.height - 6); // Parabrisas delantero
        ctx.fillRect(-15, -this.height/2 + 3, 6, this.height - 6); // Luneta trasera

        // Luces delanteras
        ctx.fillStyle = "#ffffaa";
        ctx.fillRect(this.width/2 - 2, -this.height/2 + 4, 3, 5);
        ctx.fillRect(this.width/2 - 2, this.height/2 - 9, 3, 5);

        ctx.restore();
    }
}

// CLASE PEATÓN (IA Básica)
class Pedestrian {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 8;
        this.speed = 1.5;
        this.angle = Math.random() * Math.PI * 2;
        this.changeDirTimer = Math.random() * 100;
    }

    update() {
        this.changeDirTimer--;
        if (this.changeDirTimer <= 0) {
            this.angle = Math.random() * Math.PI * 2;
            this.changeDirTimer = Math.random() * 200 + 100;
        }

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Límites del mapa para peatones
        if (this.x < 0 || this.x > WORLD_SIZE) this.angle += Math.PI;
        if (this.y < 0 || this.y > WORLD_SIZE) this.angle += Math.PI;
    }

    draw(cameraX, cameraY) {
        ctx.beginPath();
        ctx.arc(this.x - cameraX, this.y - cameraY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#e0a96d"; // Color piel/ropa
        ctx.fill();
        ctx.closePath();
    }
}

// CLASE JUGADOR (A pie)
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.speed = 4;
        this.inVehicle = null; // Guarda la referencia del auto si está adentro
    }

    update() {
        if (this.inVehicle) {
            // Si está en el auto, su posición es la del auto
            this.x = this.inVehicle.x;
            this.y = this.inVehicle.y;
            return;
        }

        // Movimiento a pie
        let dx = 0;
        let dy = 0;
        if (keys['w']) dy = -this.speed;
        if (keys['s']) dy = this.speed;
        if (keys['a']) dx = -this.speed;
        if (keys['d']) dx = this.speed;

        // Normalizar diagonal
        if (dx !== 0 && dy !== 0) {
            dx *= 0.7071;
            dy *= 0.7071;
        }

        this.x += dx;
        this.y += dy;
    }

    draw(cameraX, cameraY) {
        if (this.inVehicle) return; // No se dibuja si está adentro del auto

        ctx.beginPath();
        ctx.arc(this.x - cameraX, this.y - cameraY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ff3333"; // Remera roja estilo GTA 1
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.stroke();
        ctx.closePath();
    }
}

// INICIALIZACIÓN DE OBJETOS
const player = new Player(450, 450);
const vehicles = [
    new Vehicle(400, 500, "#ffcc00"), // Taxi
    new Vehicle(800, 400, "#33cc33"), // Deportivo verde
    new Vehicle(1200, 800, "#3355ff"), // Sedán azul
    new Vehicle(500, 1200, "#ffffff")  // Blanco común
];

const pedestrians = [];
for (let i = 0; i < 50; i++) {
    pedestrians.push(new Pedestrian(Math.random() * WORLD_SIZE, Math.random() * WORLD_SIZE));
}

// LÓGICA DE ENTRAR/SALIR DE AUTOS (Tecla E)
let ePressed = false;
function handleVehicleInteraction() {
    if (keys['e']) {
        if (!ePressed) {
            ePressed = true;

            if (player.inVehicle) {
                // SALIR DEL AUTO
                const car = player.inVehicle;
                car.isOccupied = false;
                player.inVehicle = null;
                // Lo deja un toque al costado para que no quede encima
                player.x = car.x + Math.cos(car.angle + Math.PI/2) * 40;
                player.y = car.y + Math.sin(car.angle + Math.PI/2) * 40;
                document.getElementById("status").innerText = "Estado: A pie";
            } else {
                // INTENTAR ENTRAR A UN AUTO (Buscar el más cercano)
                for (let car of vehicles) {
                    const dist = Math.hypot(player.x - car.x, player.y - car.y);
                    if (dist < 50) { // Distancia de rango de robo
                        player.inVehicle = car;
                        car.isOccupied = true;
                        document.getElementById("status").innerText = "Estado: Manejando";
                        break;
                    }
                }
            }
        }
    } else {
        ePressed = false;
    }
}

// DIBUJAR EL MAPA (Ciudad procedural simple)
function drawMap(cameraX, cameraY) {
    ctx.fillStyle = "#333"; // Color del asfalto de las calles
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibujar manzanas de edificios
    ctx.fillStyle = "#1a1a1a"; // Color bloques
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 5;

    for (let x = 0; x < WORLD_SIZE; x += GRID_SIZE) {
        for (let y = 0; y < WORLD_SIZE; y += GRID_SIZE) {
            // Dejar espacio para las calles entre bloques
            const blockX = x + 40 - cameraX;
            const blockY = y + 40 - cameraY;
            const blockSize = GRID_SIZE - 80;

            // Solo dibujar si está en pantalla (Optimización)
            if (blockX + blockSize > 0 && blockX < canvas.width && blockY + blockSize > 0 && blockY < canvas.height) {
                ctx.fillRect(blockX, blockY, blockSize, blockSize);
                ctx.strokeRect(blockX, blockY, blockSize, blockSize);
                
                // Techos interiores estilo GTA antiguo
                ctx.fillStyle = "#262626";
                ctx.fillRect(blockX + 20, blockY + 20, blockSize - 40, blockSize - 40);
                ctx.fillStyle = "#1a1a1a";
            }
        }
    }
}

// LOOP PRINCIPAL DEL JUEGO
function gameLoop() {
    // 1. ACTUALIZAR ESTADOS
    player.update();
    vehicles.forEach(car => car.update());
    pedestrians.forEach(p => p.update());
    handleVehicleInteraction();

    // 2. CONFIGURAR CÁMARA SUAVE (Centrada en el jugador)
    const cameraX = player.x - canvas.width / 2;
    const cameraY = player.y - canvas.height / 2;

    // 3. RENDERIZAR TODO
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawMap(cameraX, cameraY);
    pedestrians.forEach(p => p.draw(cameraX, cameraY));
    vehicles.forEach(car => car.draw(cameraX, cameraY));
    player.draw(cameraX, cameraY);

    requestAnimationFrame(gameLoop);
}

// Arrancar el juego
gameLoop();
</script>

</body>
</html>
