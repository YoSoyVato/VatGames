<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAW: El Juego - Bienvenido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pantalla de Menú Principal -->
    <div id="mainMenu" class="screen active">
        <div class="container-menu">
            <div class="logo-container">
                <h1 class="title-saw">SAW</h1>
                <p class="subtitle">EL JUEGO</p>
                <div class="saw-line"></div>
                <p class="tagline">"¿Crees que mereces vivir?"</p>
            </div>

            <div class="menu-buttons">
                <button class="btn btn-play" onclick="startGame()">
                    <span class="btn-icon">▶</span> JUGAR
                </button>
                <button class="btn btn-options" onclick="openOptions()">
                    <span class="btn-icon">⚙</span> OPCIONES
                </button>
                <button class="btn btn-exit" onclick="exitGame()">
                    <span class="btn-icon">✕</span> SALIR
                </button>
            </div>

            <div class="footer-saw">
                <p>🔥 Un juego de ingenio y supervivencia 🔥</p>
            </div>
        </div>

        <!-- Efecto de sangre animada en fondo -->
        <div class="blood-splash-1"></div>
        <div class="blood-splash-2"></div>
    </div>

    <!-- Pantalla de Opciones -->
    <div id="optionsMenu" class="screen">
        <div class="container-options">
            <h2 class="options-title">OPCIONES</h2>
            <div class="options-divider"></div>

            <div class="option-group">
                <label for="username" class="option-label">Nombre de Usuario:</label>
                <input 
                    type="text" 
                    id="username" 
                    class="input-field" 
                    placeholder="Ingresa tu nombre..."
                    maxlength="20"
                >
                <p class="input-info">Aparecerá en el lore y durante el juego</p>
            </div>

            <div class="option-group">
                <label for="difficulty" class="option-label">Dificultad:</label>
                <select id="difficulty" class="select-field">
                    <option value="easy">🟢 Fácil - Prueba tu ingenio</option>
                    <option value="normal" selected>🟡 Normal - El desafío verdadero</option>
                    <option value="hard">🔴 Difícil - ¿Mereces vivir?</option>
                    <option value="nightmare">⚫ Pesadilla - Solo los valientes</option>
                </select>
            </div>

            <div class="option-group">
                <label for="volume" class="option-label">Volumen de Sonido: <span id="volumeValue">70</span>%</label>
                <input 
                    type="range" 
                    id="volume" 
                    class="slider-field" 
                    min="0" 
                    max="100" 
                    value="70"
                    oninput="updateVolumeDisplay(this.value)"
                >
            </div>

            <div class="option-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="bloodEffect" checked>
                    <span class="checkmark"></span>
                    Efectos de sangre (Recomendado)
                </label>
            </div>

            <div class="option-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="ambientSound" checked>
                    <span class="checkmark"></span>
                    Sonidos ambientales
                </label>
            </div>

            <div class="option-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="difficultMemories" checked>
                    <span class="checkmark"></span>
                    Mostrar historias perturbadoras
                </label>
            </div>

            <div class="options-buttons">
                <button class="btn btn-save" onclick="saveOptions()">
                    <span class="btn-icon">✓</span> GUARDAR
                </button>
                <button class="btn btn-back" onclick="backToMenu()">
                    <span class="btn-icon">←</span> ATRÁS
                </button>
            </div>

            <!-- Mensaje de estado -->
            <div id="statusMessage" class="status-message"></div>
        </div>
    </div>

    <!-- Pantalla de Carga del Juego -->
    <div id="gameLoading" class="screen">
        <div class="container-loading">
            <h2 class="loading-title">Preparando tu juicio...</h2>
            <div class="loader">
                <div class="loader-inner"></div>
            </div>
            <p class="loading-text">El Juego está listo para ti,</p>
            <p class="loading-text"><span id="playerNameLoading">Jugador</span>...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
