<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slasher Chronicles - Infiltración Avanzada</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #020205;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            cursor: crosshair;
            padding: 20px;
        }

        /* FILTRO CINEMÁTICO CRT, SCANLINES Y RUIDO ORGÁNICO */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%),
                        radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.2) 100%);
            background-size: 100% 4px, 100% 100%;
            z-index: 100;
            pointer-events: none;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, transparent 20%, rgba(1, 1, 3, 0.85) 100%);
            z-index: 101;
            pointer-events: none;
        }

        /* CONTENEDOR PRINCIPAL REALISTA */
        .game-container {
            width: 100%;
            max-width: 1050px;
            background: #040408;
            border: 1px solid #111827;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 35px 100px -15px rgba(0, 0, 0, 0.95), 0 0 40px rgba(2, 6, 23, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* VIEWPORT 16:9 DENTRO DEL JUEGO */
        .viewport {
            width: 100%;
            aspect-ratio: 16 / 7.5;
            position: relative;
            background: #010102;
            border-bottom: 1px solid #111827;
            overflow: hidden;
        }

        .scene-graphics {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: 1;
        }

        /* VIÑETA DE CLAUSTROFOBIA IN-GAME */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(1, 1, 2, 0.98) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* INTERFAZ INFERIOR (PANEL DE CONTROL TÁCTICO) */
        .ui-panel {
            padding: 25px;
            background: linear-gradient(180deg, #05050a 0%, #020204 100%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 4;
        }

        /* BARRA DE ESTADO MEJORADA */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            font-weight: 700;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            border-bottom: 1px solid #111827;
            padding-bottom: 12px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #game-status { color: #f59e0b; font-weight: 700; text-shadow: 0 0 8px rgba(245, 158, 11, 0.2); }
        #inventory-status { color: #0ea5e9; font-weight: 700; text-shadow: 0 0 8px rgba(14, 165, 233, 0.2); }

        /* CUADRO DE TEXTO HISTORIA */
        .story-box {
            font-size: 0.9rem;
            color: #9ca3af;
            min-height: 54px;
            line-height: 1.7;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* BOTONES ULTRA REALISTAS */
        .options-container {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .btn-option {
            flex: 1;
            background: linear-gradient(180deg, #070a12 0%, #03050a 100%);
            border: 1px solid #1f2937;
            color: #6b7280;
            padding: 15px 24px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: left;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            letter-spacing: 1.2px;
            position: relative;
            overflow: hidden;
        }

        .btn-option::before {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 2px;
            background: transparent;
            transition: all 0.2s;
        }

        .btn-option:hover {
            background: linear-gradient(180deg, #111827 0%, #0b0f19 100%);
            color: #f3f4f6;
            border-color: #374151;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.6);
            transform: translateY(-2px);
        }
        
        .btn-option:hover::before {
            background: #3b82f6;
        }

        /* Estilo dinámico según peligro/acción del nodo */
        .btn-option.danger-action:hover {
            color: #fca5a5;
            border-color: #dc2626;
            box-shadow: 0 10px 25px -5px rgba(220, 38, 38, 0.15);
        }
        
        .btn-option.danger-action:hover::before {
            background: #ef4444;
        }

        /* ANIMACIONES REALISTAS DE INCIDENCIA DE LLUVIA VÍA CSS */
        @keyframes rainFall {
            0% { transform: translateY(-120px) translateX(0px); }
            100% { transform: translateY(500px) translateX(-40px); }
        }

        @keyframes dripDrop {
            0% { transform: translateY(0) scaleY(1); opacity: 0; }
            10% { opacity: 0.4; }
            80% { transform: translateY(180px) scaleY(1.2); opacity: 0.2; }
            100% { transform: translateY(220px) scaleY(0.1); opacity: 0; }
        }

        .rain-drop {
            animation: rainFall 0.4s linear infinite;
        }

        .window-drip {
            animation: dripDrop 3.5s ease-in infinite;
        }
    </style>
</head>

                            <radialGradient id="green-alert" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#064e3b" stop-opacity="0.7"/>
                                <stop offset="100%" stop-color="#02140d" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                        <rect width="1050" height="450" fill="#02140d"/>
                        <circle cx="525" cy="225" r="500" fill="url(#green-alert)"/>
                        <rect width="1050" height="450" fill="none" stroke="#10b981" stroke-width="4" opacity="0.2"/>
                        
                        <g fill="#10b981" font-family="'JetBrains Mono', monospace">
                            <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" font-size="32" font-weight="700" letter-spacing="6">CONTRATO COMPLETADO</text>
                            <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" fill="#a7f3d0" font-size="13" letter-spacing="1.5" opacity="0.7">CALIFICACIÓN OPERATIVA: FANTASMA (S+)</text>
                        </g>
                    </svg>
                `,
                options: [
                    { text: "🔄 Reiniciar simulación táctica", nextNode: "exterior_ventana", resetInv: true, isDanger: false }
                ]
            },
            final_caotico: {
                status: "ÉXITO PARCIAL",
                inventoryUpdate: null,
                story: "Arrancás los fusibles principales de la pared. Un arco de chispas reales ilumina la sala un microsegundo antes del apagón total. El corte repentino desata un forcejeo errático y violento en la oscuridad absoluta. Aunque resuelves la baja, el ruido alertará a los vecinos en minutos. Demasiado caótico.",
                svg: `
                    <svg viewBox="0 0 1050 450" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
                        <defs>
                            <radialGradient id="orange-alert" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#7c2d12" stop-opacity="0.7"/>

                        </g>
                    </svg>
                `,
                options: [
                    { text: "🔄 Reiniciar simulación táctica", nextNode: "exterior_ventana", resetInv: true, isDanger: false }
                ]
            }
        };

        function cambiarEscena(idNodo) {
            const escena = escenas[idNodo];
            
            if (escena.resetInv) {
                inventario.tieneArma = false;
                inventario.tipoArma = "Ninguna";
            }

            if (escena.inventoryUpdate) {
                inventario = { ...inventario, ...escena.inventoryUpdate };
            }

            document.getElementById("story-text").innerText = escena.story;
            document.getElementById("game-status").innerText = escena.status;
            document.getElementById("inventory-status").innerText = inventario.tipoArma.toUpperCase();
            document.getElementById("scene-graphics").innerHTML = escena.svg;

            // Cambiar dinámicamente colores de estatus tácticos
            const statusLabel = document.getElementById("game-status");
            if (escena.status === "ÉXITO") {
                statusLabel.style.color = "#10b981";
            } else if (escena.status === "CRÍTICO") {
                statusLabel.style.color = "#ef4444";
            } else if (escena.status === "PREPARADO" || escena.status === "INFILTRADO") {
                statusLabel.style.color = "#0ea5e9";
            } else {
                statusLabel.style.color = "#f59e0b";
            }

            const contenedorOpciones = document.getElementById("options-container");
            contenedorOpciones.innerHTML = "";

            escena.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                if(opt.isDanger) btn.classList.add("danger-action");
                btn.innerText = opt.text;
                btn.onclick = () => cambiarEscena(opt.nextNode);
                contenedorOpciones.appendChild(btn);
            });
        }

        window.onload = () => {
            cambiarEscena("exterior_ventana");
        };
    </script>
</body>
