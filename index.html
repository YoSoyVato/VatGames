<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slasher Chronicles - Infiltración</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
        }

        body {
            background-color: #030305;
            color: #ff3333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair; /* Cursor de mira/acecho */
        }

        /* EFECTO DE TELEVISOR CRT VIEJO */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
            animation: flicker 0.2s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .game-container {
            width: 900px;
            height: 680px;
            border: 4px solid #15151c;
            background: #000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* EL VISOR EN PRIMERA PERSONA */
        .viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 4px solid #15151c;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gráficos vectoriales dinámicos que cambian por escena */
        .scene-graphics {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 90%);
            pointer-events: none;
            z-index: 2;
        }

        .ambient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: color-burn;
        }

        /* INTERFAZ INFERIOR */
        .ui-panel {
            height: 250px;
            background: #07070a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 4;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            color: #707b8c;
            border-bottom: 2px solid #15151c;
            padding-bottom: 4px;
        }

        #game-status { color: #ffcc00; font-weight: bold; }
        #inventory-status { color: #00ffcc; }

        .story-box {
            font-size: 1.6rem;
            color: #d1d5db;
            min-height: 65px;
            line-height: 1.3;
        }

        .options-container {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-option {
            flex: 1;
            background: #0d0d13;
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 14px;
            font-size: 1.4rem;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-option:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <div class="game-container">
        <!-- Renderizador Visual Primera Persona -->
        <div class="viewport" id="viewport">
            <div class="vignette"></div>
            <div class="ambient-overlay" id="ambient-overlay"></div>
            <!-- Los vectores SVG de la escena se inyectan acá -->
            <div class="scene-graphics" id="scene-graphics"></div>
        </div>

        <!-- Panel de Control e Historia -->
        <div class="ui-panel">
            <div class="status-bar">
                <span>VISTA: PRIMERA PERSONA</span>
                <span id="inventory-status">INVENTARIO: VACÍO</span>
                <span id="game-status">ESTADO: EXTERIOR</span>
            </div>
            
            <div class="story-box">
                <p id="story-text">Cargando...</p>
            </div>

            <div class="options-container" id="options-container"></div>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL DEL JUGADOR
        let inventario = { tieneArma: false, tipoArma: "Ninguna" };

        // REPOSITORIO DE ESCENAS CON GRÁFICOS VECTORIALES (SVG) PARA GENERAR EL LOOK DE JUEGO 2D REALISTA
        const escenas = {
            exterior_ventana: {
                status: "ACECHANDO",
                inventoryUpdate: null,
                story: "Estás afuera. La lluvia corre por los cristales. A través de la ventana iluminada ves la silueta de tu objetivo de espaldas en su escritorio. La parte inferior del marco está rota.",
                // Dibuja una ventana en perspectiva con lluvia exterior y silueta al fondo
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#0c101b"/>
                        <!-- Pared de ladrillos exterior en penumbra -->
                        <path d="M0,0 L250,0 L250,430 L0,430 Z" fill="#050608"/>
                        <path d="M650,0 L900,0 L900,430 L650,430 Z" fill="#050608"/>
                        <!-- Marco de la Ventana -->
                        <rect x="250" y="30" width="400" height="370" fill="none" stroke="#222733" stroke-width="12"/>
                        <line x1="450" y1="30" x2="450" y2="400" stroke="#222733" stroke-width="6"/>
                        <!-- Interior Iluminado Cálido -->
                        <rect x="262" y="42" width="376" height="346" fill="url(#interiorGlow)"/>
                        <!-- Silueta de la Víctima de espaldas -->
                        <path d="M410,320 Q450,220 490,320 Q480,380 490,400 L410,400 Z" fill="#07070a"/>
                        <circle cx="450" cy="220" r="25" fill="#07070a"/>
                        <!-- Efecto Lluvia en el vidrio -->
                        <line x1="300" y1="50" x2="290" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                        <line x1="550" y1="80" x2="540" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
                        <line x1="380" y1="150" x2="370" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                        <defs>
                            <radialGradient id="interiorGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#bf8a3c" stop-opacity="0.6"/>
                                <stop offset="100%" stop-color="#181510"/>
                            </radialGradient>
                        </defs>
                    </svg>
                `,
                options: [
                    { text: "🪟 Forzar la ventana y entrar directo", nextNode: "entrar_casa_desarmado" },
                    { text: "🪵 Revisar el cobertizo oscuro del patio trasero", nextNode: "cobertizo" }
                ]
            },
            cobertizo: {
                status: "BUSCANDO ARMA",
                inventoryUpdate: null,
                story: "Entrás al cobertizo. Huele a humedad y fierro viejo. La luz de la luna apenas entra por las maderas del techo, iluminando un estante empotrado en la pared.",
                // Dibuja el interior de un cobertizo con herramientas colgadas
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#08080c"/>
                        <!-- Estante -->
                        <rect x="150" y="250" width="600" height="15" fill="#2c1e15"/>
                        <!-- Siluetas de herramientas de fondo -->
                        <path d="M220,100 L230,100 L230,220 L220,220 Z" fill="#1a1a24"/>
                        <circle cx="225" cy="90" r="12" fill="#1a1a24"/>
                        <!-- Cuchillo de Cazador Brillando en el estante -->
                        <path d="M400,240 L520,240 L540,233 L510,235 L400,235 Z" fill="#e2e8f0" id="knife-blade"/>
                        <rect x="360" y="235" width="40" height="7" fill="#5c4033"/>
                        <!-- Linterna de luna filtrada -->
                        <path d="M0,0 L900,430 L550,430 L0,150 Z" fill="url(#moonRay)" style="mix-blend-mode: screen;"/>
                        <defs>
                            <linearGradient id="moonRay" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4a5568" stop-opacity="0.3"/>
                                <stop offset="100%" stop-color="#000" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                    </svg>
                `,
                options: [
                    { text: "🔪 Agarrar el Cuchillo de Caza", nextNode: "cobertizo_armado" },
                    { text: "↩️ Volver a la ventana del frente", nextNode: "exterior_ventana" }
                ]
            },
            cobertizo_armado: {
                status: "ARMADO",
                inventoryUpdate: { tieneArma: true, tipoArma: "Cuchillo de Caza" },
                story: "Sopesás el metal frío en tu mano. El filo está impecable. Ahora estás listo para proceder con el analista.",
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#050508"/>
                        <rect x="150" y="250" width="600" height="15" fill="#1c140e"/>
                        <!-- Primer plano de la mano sosteniendo el arma -->
                        <path d="M100,430 Q250,250 450,320 L400,430 Z" fill="#0d0d13"/>
                        <!-- Hoja del cuchillo apuntando arriba -->
                        <path d="M410,320 L580,120 L610,100 L590,150 L440,340 Z" fill="#94a3b8" stroke="#cbd5e1" stroke-width="2"/>
                        <path d="M410,320 L440,340 L380,390 L350,370 Z" fill="#3e2723"/>
                    </svg>
                `,
                options: [
                    { text: "🪟 Volver a la ventana e ingresar a la casa", nextNode: "entrar_casa_armado" }
                ]
            },
            entrar_casa_desarmado: {
                status: "FALLIDO",
                inventoryUpdate: null,
                story: "Deslizás el marco hacia arriba y saltás al living. Al no llevar nada para defenderte o amedrentar, el crujido alerta al objetivo. Se da vuelta, te ve la máscara, te empuja con el monitor y escapa gritando al vecindario. GAME OVER.",
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#4a1a1a"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#ff3333" font-size="48">TE DESCUBRIERON</text>
                    </svg>
                `,
                options: [
                    { text: "🔄 Reintentar desde el inicio", nextNode: "exterior_ventana", resetInv: true }
                ]
            },
            entrar_casa_armado: {
                status: "DENTRO DE LA CASA",
                inventoryUpdate: null,
                story: "Entrás sigilosamente por la ventana rota. El living está en penumbra, solo iluminado por el brillo azul de la computadora del analista. Está totalmente indefenso de espaldas a vos.",
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#060810"/>
                        <!-- El brillo del monitor del objetivo -->
                        <path d="M300,430 L450,150 L550,150 L700,430 Z" fill="url(#monitorGlow)" style="mix-blend-mode: screen;"/>
                        <!-- Escritorio y silueta trasera -->
                        <rect x="420" y="240" width="160" height="10" fill="#0a0f1d"/>
                        <path d="M460,330 Q500,240 540,330 L460,330 Z" fill="#020203"/>
                        <circle cx="500" cy="240" r="20" fill="#020203"/>
                        <!-- Mano con el cuchillo asomando en la esquina inferior izquierda -->
                        <path d="M0,430 L120,310 L160,350 L50,430 Z" fill="#09090d"/>
                        <path d="M120,310 L280,180 L295,170 L285,200 L160,350 Z" fill="#64748b"/>
                        <defs>
                            <linearGradient id="monitorGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#00ffff" stop-opacity="0.3"/>
                                <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                    </svg>
                `,
                options: [
                    { text: "🤫 Ejecución silenciosa por la espalda", nextNode: "final_perfecto" },
                    { text: "⚡ Cortar el cable de la computadora primero", nextNode: "final_caotico" }
                ]
            },
            final_perfecto: {
                status: "MISIÓN COMPLETADA",
                inventoryUpdate: null,
                story: "Paso firme y sin ruido. Antes de que el código termine de compilar en su pantalla, tu trabajo está hecho. Limpiás la escena, guardás el cuchillo y salís por donde viniste sin dejar rastro.",
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#142115"/>
                        <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" fill="#52ff52" font-size="52">EJECUCIÓN LIMPIA</text>
                        <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="#a3e635" font-size="24">Misión 1 Terminada con éxito</text>
                    </svg>
                `,
                options: [
                    { text: "🔄 Jugar de nuevo", nextNode: "exterior_ventana", resetInv: true }
                ]
            },
            final_caotico: {
                status: "MISIÓN COMPLETADA",
                inventoryUpdate: null,
                story: "Cortás el cable, la pantalla chispea y todo queda oscuro. El analista salta del susto y forcejea con vos en el piso, pero tu ventaja con el cuchillo liquida el encuentro. Dejaste demasiado desorden.",
                svg: `
                    <svg viewBox="0 0 900 430" width="100%" height="100%">
                        <rect width="900" height="430" fill="#241a10"/>
                        <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" fill="#ffaa00" font-size="52">EJECUCIÓN CAÓTICA</text>
                        <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="#d97706" font-size="24">Sobreviviste, pero alertaste a los vecinos.</text>
                    </svg>
                `,
                options: [
                    { text: "🔄 Jugar de nuevo", nextNode: "exterior_ventana", resetInv: true }
                ]
            }
        };

        // MOTOR DEL JUEGO P&C
        function cambiarEscena(idNodo) {
            const escena = escenas[idNodo];
            
            // Si la opción requiere resetear inventario
            if (escenas[idNodo].resetInv) {
                inventario.tieneArma = false;
                inventario.tipoArma = "Ninguna";
            }

            // Aplicar actualizaciones de inventario si el nodo las tiene
            if (escena.inventoryUpdate) {
                inventario = { ...inventario, ...escena.inventoryUpdate };
            }

            // Actualizar interfaz de texto
            document.getElementById("story-text").innerText = escena.story;
            document.getElementById("game-status").innerText = `ESTADO: ${escena.status}`;
            document.getElementById("inventory-status").innerText = `INVENTARIO: ${inventario.tipoArma.toUpperCase()}`;

            // Inyectar el gráfico en primera persona del viewport
            document.getElementById("scene-graphics").innerHTML = escena.svg;

            // Manejo de colores de la UI según estado
            const statusLabel = document.getElementById("game-status");
            if (escena.status === "MISIÓN COMPLETADA") {
                statusLabel.style.color = "#52ff52";
            } else if (escena.status === "FALLIDO") {
                statusLabel.style.color = "#ff3333";
            } else if (escena.status === "ARMADO") {
                statusLabel.style.color = "#00ffcc";
            } else {
                statusLabel.style.color = "#ffcc00";
            }

            // Renderizar los botones de opciones
            const contenedorOpciones = document.getElementById("options-container");
            contenedorOpciones.innerHTML = "";

            escena.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = opt.text;
                btn.onclick = () => cambiarEscena(opt.nextNode);
                contenedorOpciones.appendChild(btn);
            });
        }

        // Carga inicial al abrir el navegador
        window.onload = () => {
            cambiarEscena("exterior_ventana");
        };
    </script>
</body>
</html>
