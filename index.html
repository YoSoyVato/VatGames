<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SKYLARK ENGINE | Panel de Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { border-bottom: 2px solid #38bdf8; padding-bottom: 10px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #38bdf8; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SKYLARK ENGINE</h1>
            <p>Panel de Gestión de Mundos y Activos</p>
        </div>

        <div id="lista-mundos">
            <!-- Aquí se cargarán tus mundos automáticamente -->
        </div>
    </div>

    <script>
        // --- SOLO TIENES QUE EDITAR ESTA LISTA ---
        const misMundos = [
            { nombre: "Survival World 01", fecha: "01/07/2026", archivo: "mundos/survival_v1.zip" },
            { nombre: "Lobby Map Main", fecha: "25/06/2026", archivo: "mundos/lobby_map.zip" },
            { nombre: "Mi Nuevo Mapa Pro", fecha: "01/07/2026", archivo: "mundos/nuevo_mapa.zip" }
        ];

        const contenedor = document.getElementById('lista-mundos');
        misMundos.forEach(mundo => {
            contenedor.innerHTML += `
                <div class="card">
                    <div>
                        <h3>${mundo.nombre}</h3>
                        <p>Última actualización: ${mundo.fecha}</p>
                    </div>
                    <a href="${mundo.archivo}" class="btn">DESCARGAR</a>
                </div>
            `;
        });
    </script>
</body>
</html>
