<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA OPERATIVO 911 - v4.0.1</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        #terminal {
            border: 2px solid #00ff66;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            background-color: #020f05;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }
        .opciones {
            margin-top: 20px;
        }
        button {
            background-color: #00ff66;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <h2>SISTEMA DE DESPACHO DE EMERGENCIAS (DISTRITO 9)</h2>
    <hr>
    
    <div id="terminal">
        <p>[SISTEMA]: Turno de noche iniciado. Bienvenido, Operador 421.</p>
        <p>[SISTEMA]: Recordatorio: No haga preguntas fuera del manual.</p>
        <p style="color: #ff3333;">📢 LLAMADA ENTRANTE DE: ANONIMO (02:14 AM)...</p>
    </div>

    <div class="opciones">
        <button onclick="responderLlamada()">Contestar Llamada</button>
    </div>

    <script>
        function responderLlamada() {
            const term = document.getElementById('terminal');
            term.innerHTML += "<p><b>Operador:</b> 911, ¿cuál es su emergencia?</p>";
            setTimeout(() => {
                term.innerHTML += "<p><b>Voz anónima:</b> ...Hola? Por favor, no cuelguen. Hay un hombre parado en mi patio... pero es demasiado alto. Sus rodillas se doblan hacia atrás...</p>";
                // Aquí añadirías más opciones de diálogo
            }, 1500);
        }
    </script>
</body>
</html>
