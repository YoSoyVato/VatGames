<button class="btn" onclick="agregarServidor()">+ Agregar Servidor</button>

<script>
    function agregarServidor() {
        let nombre = prompt("Nombre del servidor (ej: Survival):");
        let ruta = prompt("Ruta de la carpeta (ej: C:/Servers/Survival):");
        
        if (nombre && ruta) {
            let nuevoServer = { nombre: nombre, ruta: ruta, fecha: new Date().toLocaleDateString() };
            // Guardar en el navegador
            let servers = JSON.parse(localStorage.getItem('misServers') || '[]');
            servers.push(nuevoServer);
            localStorage.setItem('misServers', JSON.stringify(servers));
            location.reload(); // Recargar para ver el cambio
        }
    }

    // Cargar al iniciar
    let guardados = JSON.parse(localStorage.getItem('misServers') || '[]');
    guardados.forEach(s => {
        contenedor.innerHTML += `
            <div class="card">
                <div>
                    <h3>${s.nombre}</h3>
                    <p>Ruta: ${s.ruta}</p>
                </div>
                <button class="btn">Abrir Consola</button>
            </div>
        `;
    });
</script>
