<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: El Dilema</title>
    <style>
        /* --- ESTILOS GENERALES Y CONFIGURACIÓN --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            cursor: none; /* Ocultamos el cursor físico */
        }

        /* --- CURSOR PERSONALIZADO (MANO) --- */
        #custom-cursor {
            width: 64px;
            height: 64px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-20%, -20%);
            transition: transform 0.05s ease-out;
        }

        /* --- PANTALLA DE REGISTRO DE USUARIO --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0a0c0b;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        .login-box {
            background-color: #121614;
            padding: 40px;
            border: 2px solid #28322d;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        .login-box h2 {
            color: #33ff33;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-shadow: 0 0 5px rgba(51,255,51,0.5);
        }

        .login-box input {
            background-color: #080a09;
            border: 1px solid #33ff33;
            color: #33ff33;
            padding: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            width: 250px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .login-box button {
            background-color: #1c221f;
            color: #33ff33;
            border: 1px solid #33ff33;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 1rem;
            cursor: none;
            transition: 0.2s;
        }

        .login-box button:hover {
            background-color: #33ff33;
            color: #000;
        }

        /* --- ESCENARIO: LA HABITACIÓN --- */
        .room {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(circle at 50% 30%, rgba(40, 50, 45, 0.4) 0%, rgba(10, 15, 12, 0.9) 70%),
                linear-gradient(to bottom, #141916 0%, #0a0d0b 100%);
            position: relative;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.95);
        }

        .room::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: repeating-linear-gradient(45deg, #000 25px, transparent 50px);
            pointer-events: none;
        }

        /* --- LA MESA --- */
        .table {
            width: 780px;
            height: 320px;
            background: linear-gradient(to bottom, #2b2e2c 0%, #181a19 20%, #0d0e0d 100%);
            border: 4px solid #3a3f3c;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            position: absolute;
            bottom: 0;
            box-shadow: 
                0 -20px 50px rgba(0, 0, 0, 0.8),
                inset 0 10px 20px rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- OBJETO: LA NOTA SOBRE LA MESA --- */
        .note-paper {
            width: 90px;
            height: 60px;
            background: linear-gradient(135deg, #c2b280 0%, #a89968 100%);
            border-radius: 2px;
            position: absolute;
            left: 40px;
            bottom: 60px;
            transform: rotate(-15deg);
            box-shadow: 3px 5px 10px rgba(0,0,0,0.6);
            border: 1px solid #8a7d52;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5px;
            overflow: hidden;
        }

        .note-paper::before {
            content: 'LEEME';
            color: #4a3e1a;
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            border: 1px dashed #4a3e1a;
            padding: 2px;
        }

        .note-paper:hover {
            filter: brightness(1.1);
            transform: rotate(-12deg) scale(1.05);
        }

        /* --- MODAL DE LECTURA DE LA NOTA --- */
        #note-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .note-content {
            background: #e6dfc3;
            color: #1a1508;
            width: 500px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            position: relative;
            border: 1px solid #b3a986;
        }

        .note-content p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .note-content .close-btn {
            display: block;
            margin-top: 30px;
            background-color: #2b2515;
            color: #e6dfc3;
            border: none;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            cursor: none;
        }

        .note-content .close-btn:hover {
            background-color: #473e24;
        }

        /* --- EL DISPOSITIVO (LA BOMBA) --- */
        .device {
            width: 460px;
            height: 220px;
            background: linear-gradient(135deg, #404543 0%, #202322 100%);
            border: 5px solid #1a1c1b;
            border-radius: 12px;
            position: relative;
            bottom: 40px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.9),
                inset 2px 2px 5px rgba(255,255,255,0.1);
            display: flex;
            padding: 20px;
            justify-content: space-between;
            align-items: center;
        }

        /* --- SUB-MÓDULOS DE LA BOMBA --- */
        .timer-display {
            width: 180px;
            height: 90px;
            background-color: #08100c;
            border: 4px solid #282c2a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        .timer-text {
            color: #33ff33;
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(51, 255, 51, 0.6);
        }

        .timer-text.critical {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            animation: pulse 1s infinite;
        }

        .wire-panel {
            width: 200px;
            height: 160px;
            background-color: #151716;
            border: 3px solid #282c2a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 15px 10px;
        }

        .wire-container {
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .wire {
            width: 85%;
            height: 8px;
            border-radius: 4px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .wire.red    { background: linear-gradient(to bottom, #ff3b30, #991a13); }
        .wire.blue   { background: linear-gradient(to bottom, #007aff, #004599); }
        .wire.yellow { background: linear-gradient(to bottom, #ffcc00, #997a00); }

        .wire-container::before, .wire-container::after {
            content: '';
            width: 12px;
            height: 14px;
            background-color: #666;
            border: 1px solid #333;
            border-radius: 2px;
        }

        .wire:not(.cut):hover {
            transform: scaleY(1.3);
            filter: brightness(1.2);
        }

        .wire.cut {
            width: 35%;
            background: #222 !important;
            box-shadow: none;
            transform: rotate(-10deg);
        }

        /* --- ALERTAS DE JUEGO --- */
        #game-over-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
        }

        #game-over-screen h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px red;
        }

        #game-over-screen button {
            padding: 12px 24px;
            background-color: #222;
            color: #fff;
            border: 2px solid #ff3333;
            cursor: none;
            font-family: monospace;
            font-weight: bold;
            transition: 0.3s;
        }

        #game-over-screen button:hover {
            background-color: #ff3333;
            color: #000;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <svg id="custom-cursor" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M24,32 C20,24 16,18 16,12 C16,8 20,6 22,10 C24,14 26,22 26,22 C26,22 27,10 29,6 C31,2 34,2 35,6 C36,10 37,20 37,20 C37,20 39,11 41,8 C43,5 46,5 47,9 C48,13 47,22 47,22 C47,22 50,14 52,13 C54,12 56,14 55,18 C53,24 49,32 46,38 C42,46 36,54 30,56 C24,54 20,44 24,32 Z" fill="#2d3130" stroke="#141615" stroke-width="2"/>
        <rect x="24" y="44" width="18" height="8" rx="2" fill="#1a1c1b"/>
        <circle cx="29" cy="24" r="2" fill="#555"/>
        <circle cx="35" cy="22" r="2" fill="#555"/>
        <circle cx="41" cy="24" r="2" fill="#555"/>
    </svg>

    <div id="login-screen">
        <div class="login-box">
            <h2>REGISTRO DE SUJETO</h2>
            <input type="text" id="username-input" placeholder="Introduce tu nombre" maxlength="15" autocomplete="off">
            <br>
            <button onclick="startGame()">INGRESAR AL DISPOSITIVO</button>
        </div>
    </div>

    <div class="room">
        <div class="table">
            
            <div class="note-paper" onclick="openNote()"></div>
            
            <div class="device">
                <div class="timer-display">
                    <div id="timer" class="timer-text">05:00</div>
                </div>

                <div class="wire-panel">
                    <div class="wire-container"><div class="wire red" data-wire="1" onclick="cutWire(this)"></div></div>
                    <div class="wire-container"><div class="wire blue" data-wire="2" onclick="cutWire(this)"></div></div>
                    <div class="wire-container"><div class="wire yellow" data-wire="3" onclick="cutWire(this)"></div></div>
                </div>
            </div>

        </div>
    </div>

    <div id="note-modal">
        <div class="note-content">
            <p id="note-text"></p>
            <button class="close-btn" onclick="closeNote()">VOLVER AL ARTEFACTO</button>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-result">¡BOOM!</h1>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>

    <script>
        // --- Controladores de Cursor ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mousedown', () => { cursor.style.transform = 'translate(-20%, -20%) scale(0.9) rotate(-5deg)'; });
        document.addEventListener('mouseup', () => { cursor.style.transform = 'translate(-20%, -20%) scale(1) rotate(0deg)'; });

        // --- Estado Global del Juego ---
        let timeLeft = 300; 
        let timerInterval = null;
        let username = "Desconocido";
        const correctWire = "2"; 

        const timerElement = document.getElementById('timer');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameResultText = document.getElementById('game-result');
        const loginScreen = document.getElementById('login-screen');
        const noteModal = document.getElementById('note-modal');
        const noteText = document.getElementById('note-text');

        // --- Gestión del Inicio ---
        function startGame() {
            const input = document.getElementById('username-input').value.trim();
            if (input === "") {
                alert("Debes ingresar un nombre para continuar el juego.");
                return;
            }
            username = input;
            
            // Estructura el mensaje dinámico con el nombre del usuario registrado
            noteText.innerHTML = `Hola, <span style="color:#900; font-weight:bold;">${username}</span>.<br><br>Seguro te estás preguntando dónde estás, pero eso no es lo que importa ahora mismo.<br><br>Lo que realmente importa es... ¿confías tanto en tu compañero como para que te ayude a salvar tu vida?`;
            
            // Ocultar login e iniciar sistema
            loginScreen.style.display = 'none';
            startTimer();
        }

        // --- Control de Tiempos ---
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.textContent = `${minutes}:${seconds}`;

            if (timeLeft <= 60) {
                timerElement.classList.add('critical');
            } else {
                timerElement.classList.remove('critical');
            }

            if (timeLeft <= 0) {
                endGame(false);
            } else {
                timeLeft--;
            }
        }

        // --- Interacción con la Nota ---
        function openNote() {
            noteModal.style.display = 'flex';
        }

        function closeNote() {
            noteModal.style.display = 'none';
        }

        // --- Mecánica de Cables ---
        function cutWire(wireElement) {
            if (wireElement.classList.contains('cut') || gameOverScreen.style.display === 'flex') return;

            wireElement.classList.add('cut');
            const wireID = wireElement.getAttribute('data-wire');

            if (wireID === correctWire) {
                endGame(true);
            } else {
                endGame(false);
            }
        }

        // --- Finalización ---
        function endGame(victory) {
            clearInterval(timerInterval);
            noteModal.style.display = 'none'; // Cierra la nota si estaba abierta al explotar
            gameOverScreen.style.display = 'flex';
            
            if (victory) {
                gameResultText.textContent = "SISTEMA DESACTIVADO";
                gameResultText.style.color = "#33ff33";
                gameResultText.style.textShadow = "0 0 20px green";
            } else {
                gameResultText.textContent = "¡BOOM! EJECUCIÓN COMPLETADA";
                gameResultText.style.color = "#ff3333";
                gameResultText.style.textShadow = "0 0 20px red";
            }
        }

        // --- Reinicio de Partida ---
        function resetGame() {
            timeLeft = 300;
            gameOverScreen.style.display = 'none';
            document.querySelectorAll('.wire').forEach(w => w.classList.remove('cut'));
            startTimer();
        }
    </script>
</body>
</html>
