<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: El Dilema</title>
    <style>
        /* --- ESTILOS GENERALES Y CONFIGURACIÓN --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            /* Ocultamos el cursor por defecto para usar nuestra mano personalizada */
            cursor: none; 
        }

        /* --- CURSOR PERSONALIZADO (MANO) --- */
        #custom-cursor {
            width: 64px;
            height: 64px;
            position: fixed;
            pointer-events: none; /* Evita que el cursor interfiera con los clicks */
            z-index: 9999;
            transform: translate(-20%, -20%); /* Ajusta el punto de agarre de la mano */
            transition: transform 0.05s ease-out;
        }

        /* --- ESCENARIO: LA HABITACIÓN (Perspectiva 3D con CSS) --- */
        .room {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(circle at 50% 30%, rgba(40, 50, 45, 0.4) 0%, rgba(10, 15, 12, 0.9) 70%),
                linear-gradient(to bottom, #141916 0%, #0a0d0b 100%);
            position: relative;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.95);
        }

        /* Textura de suciedad/paredes de fondo simulada */
        .room::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: repeating-linear-gradient(45deg, #000 25px, transparent 50px);
            pointer-events: none;
        }

        /* --- LA MESA --- */
        .table {
            width: 750px;
            height: 320px;
            background: linear-gradient(to bottom, #2b2e2c 0%, #181a19 20%, #0d0e0d 100%);
            border: 4px solid #3a3f3c;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            position: absolute;
            bottom: 0;
            box-shadow: 
                0 -20px 50px rgba(0, 0, 0, 0.8),
                inset 0 10px 20px rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Raspones/Óxido en la mesa */
        .table::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(139, 69, 19, 0.15) 0%, transparent 40%);
            pointer-events: none;
        }

        /* --- EL DISPOSITIVO (LA BOMBA) --- */
        .device {
            width: 460px;
            height: 220px;
            background: linear-gradient(135deg, #404543 0%, #202322 100%);
            border: 5px solid #1a1c1b;
            border-radius: 12px;
            position: relative;
            bottom: 40px; /* Eleva el dispositivo sobre la mesa */
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.9),
                inset 2px 2px 5px rgba(255,255,255,0.1);
            display: flex;
            padding: 20px;
            justify-content: space-between;
            align-items: center;
            cursor: none;
        }

        /* --- SUB-MÓDULOS DE LA BOMBA --- */
        
        /* 1. Pantalla del Temporizador (Crono) */
        .timer-display {
            width: 180px;
            height: 90px;
            background-color: #08100c;
            border: 4px solid #282c2a;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        .timer-text {
            color: #33ff33;
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(51, 255, 51, 0.6);
            font-family: monospace;
        }

        /* Estado crítico cuando queda poco tiempo */
        .timer-text.critical {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            animation: pulse 1s infinite;
        }

        /* 2. Panel de Cables Interactivos */
        .wire-panel {
            width: 200px;
            height: 160px;
            background-color: #151716;
            border: 3px solid #282c2a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 15px 10px;
        }

        .wire-container {
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            position: relative;
        }

        /* El cable físico */
        .wire {
            width: 85%;
            height: 8px;
            border-radius: 4px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        /* Colores individuales de cables */
        .wire.red    { background: linear-gradient(to bottom, #ff3b30, #991a13); }
        .wire.blue   { background: linear-gradient(to bottom, #007aff, #004599); }
        .wire.yellow { background: linear-gradient(to bottom, #ffcc00, #997a00); }

        /* Conectores en los extremos */
        .wire-container::before, .wire-container::after {
            content: '';
            width: 12px;
            height: 14px;
            background-color: #666;
            border: 1px solid #333;
            border-radius: 2px;
        }

        /* Efecto al pasar la mano por encima de un cable activo */
        .wire:not(.cut):hover {
            transform: scaleY(1.3);
            filter: brightness(1.2);
        }

        /* Estado del cable cortado */
        .wire.cut {
            width: 35%;
            background: #222 !important;
            box-shadow: none;
            transform: rotate(-10deg);
        }

        /* --- ALERTAS DE JUEGO --- */
        #game-over-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
        }

        #game-over-screen h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px red;
        }

        #game-over-screen button {
            padding: 12px 24px;
            background-color: #222;
            color: #fff;
            border: 2px solid #ff3333;
            cursor: none;
            font-family: monospace;
            font-weight: bold;
            transition: 0.3s;
        }

        #game-over-screen button:hover {
            background-color: #ff3333;
            color: #000;
        }

        /* Animaciones */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Renderizado del Cursor de la Mano (SVG embebido para que no necesites archivos externos) -->
    <svg id="custom-cursor" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <!-- Guante táctico gris/militar -->
        <path d="M24,32 C20,24 16,18 16,12 C16,8 20,6 22,10 C24,14 26,22 26,22 C26,22 27,10 29,6 C31,2 34,2 35,6 C36,10 37,20 37,20 C37,20 39,11 41,8 C43,5 46,5 47,9 C48,13 47,22 47,22 C47,22 50,14 52,13 C54,12 56,14 55,18 C53,24 49,32 46,38 C42,46 36,54 30,56 C24,54 20,44 24,32 Z" fill="#2d3130" stroke="#141615" stroke-width="2"/>
        <!-- Detalles de nudillos y correa del guante -->
        <rect x="24" y="44" width="18" height="8" rx="2" fill="#1a1c1b"/>
        <circle cx="29" cy="24" r="2" fill="#555"/>
        <circle cx="35" cy="22" r="2" fill="#555"/>
        <circle cx="41" cy="24" r="2" fill="#555"/>
    </svg>

    <!-- La Habitación Oscura -->
    <div class="room">
        
        <!-- La Mesa de Operaciones -->
        <div class="table">
            
            <!-- El Artefacto (Bomba) -->
            <div class="device">
                
                <!-- Módulo 1: Tiempo Cortante -->
                <div class="timer-display">
                    <div id="timer" class="timer-text">05:00</div>
                </div>

                <!-- Módulo 2: Sistema Mecánico de Cables -->
                <div class="wire-panel">
                    <div class="wire-container">
                        <div class="wire red" data-wire="1" onclick="cutWire(this)"></div>
                    </div>
                    <div class="wire-container">
                        <div class="wire blue" data-wire="2" onclick="cutWire(this)"></div>
                    </div>
                    <div class="wire-container">
                        <div class="wire yellow" data-wire="3" onclick="cutWire(this)"></div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Pantalla de Fin de Juego -->
    <div id="game-over-screen">
        <h1 id="game-result">¡BOOM!</h1>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>

    <!-- LÓGICA DE INTERACCIÓN -->
    <script>
        // 1. Seguimiento del ratón para el cursor de la mano
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Cambio visual de la mano al presionar el click (simula cerrar el puño)
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-20%, -20%) scale(0.9) rotate(-5deg)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-20%, -20%) scale(1) rotate(0deg)';
        });


        // 2. Sistema del Temporizador Regresivo
        let timeLeft = 300; // 5 minutos en segundos
        let timerInterval;
        const timerElement = document.getElementById('timer');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameResultText = document.getElementById('game-result');

        function updateTimer() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            // Formato de dos dígitos
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.textContent = `${minutes}:${seconds}`;

            // Alerta visual si queda menos de 1 minuto
            if (timeLeft <= 60) {
                timerElement.classList.add('critical');
            } else {
                timerElement.classList.remove('critical');
            }

            if (timeLeft <= 0) {
                endGame(false); // Fin del juego por tiempo terminado
            } else {
                timeLeft--;
            }
        }

        // 3. Mecánica del juego: Cortar cables
        // Para este prototipo local, definimos que el cable AZUL (2) desarma la bomba, los otros explotan.
        const correctWire = "2"; 

        function cutWire(wireElement) {
            if (wireElement.classList.contains('cut')) return; // Ya está cortado

            // Marcar el cable visualmente como destruido/cortado
            wireElement.classList.add('cut');
            
            const wireID = wireElement.getAttribute('data-wire');

            if (wireID === correctWire) {
                endGame(true); // ¡Salvaste el juego!
            } else {
                endGame(false); // Cable incorrecto, detonación inmediata
            }
        }

        // 4. Estados de finalización del juego
        function endGame(victory) {
            clearInterval(timerInterval);
            gameOverScreen.style.display = 'flex';
            
            if (victory) {
                gameResultText.textContent = "SISTEMA DESACTIVADO";
                gameResultText.style.color = "#33ff33";
                gameResultText.style.textShadow = "0 0 20px green";
            } else {
                gameResultText.textContent = "¡BOOM! EXECUCIÓN COMPLETADA";
                gameResultText.style.color = "#ff3333";
                gameResultText.style.textShadow = "0 0 20px red";
            }
        }

        // Reiniciar la partida
        function resetGame() {
            timeLeft = 300;
            gameOverScreen.style.display = 'none';
            document.querySelectorAll('.wire').forEach(w => w.classList.remove('cut'));
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        // Iniciar el reloj al cargar la página
        timerInterval = setInterval(updateTimer, 1000);
    </script>
</body>
</html>
