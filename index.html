<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const world = {
        width: 2400,
        height: 500
    };

    const camera = {
        x: 0,
        y: 0
    };

    const stickman = {
        x: 100,
        y: 300,
        radius: 15,
        velocityX: 0,
        velocityY: 0,
        speed: 6,
        jumpForce: 13,
        grounded: false,
        color: "#ff3333",
        animTimer: 0,
        isMoving: false
    };

    const physics = {
        gravity: 0.6,
        friction: 0.82
    };

    const keys = {};

    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    function drawStickman(x, y, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        let legSwing = 0;
        let armSwing = 0;
        let bodyYOffset = 0;

        if (!stickman.grounded) {
            legSwing = 0.5;
            armSwing = 1.2;
        } else if (stickman.isMoving) {
            legSwing = Math.sin(stickman.animTimer * 0.15) * 0.6;
            armSwing = Math.cos(stickman.animTimer * 0.15) * 0.5;
            bodyYOffset = Math.abs(Math.sin(stickman.animTimer * 0.3)) * 3;
        }

        const currentY = y + bodyYOffset;

        ctx.beginPath();
        ctx.arc(x, currentY, stickman.radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.stroke();

        const torsoBottomX = x;
        const torsoBottomY = currentY + 50;
        ctx.beginPath();
        ctx.moveTo(x, currentY + stickman.radius);
        ctx.lineTo(torsoBottomX, torsoBottomY);
        ctx.stroke();

        const shoulderY = currentY + 22;
        if (!stickman.grounded) {
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x - 15, shoulderY - 20);
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x + 15, shoulderY - 20);
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x - 18 * (1 - armSwing), shoulderY + 15 + (armSwing * 10));
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x + 18 * (1 + armSwing), shoulderY + 15 - (armSwing * 10));
            ctx.stroke();
        }

        if (!stickman.grounded) {
            ctx.beginPath();
            ctx.moveTo(torsoBottomX, torsoBottomY);
            ctx.lineTo(torsoBottomX - 10, torsoBottomY + 20);
            ctx.lineTo(torsoBottomX - 5, torsoBottomY + 30);
            ctx.moveTo(torsoBottomX, torsoBottomY);
            ctx.lineTo(torsoBottomX + 10, torsoBottomY + 20);
            ctx.lineTo(torsoBottomX + 15, torsoBottomY + 30);
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.moveTo(torsoBottomX, torsoBottomY);
            ctx.lineTo(torsoBottomX - 15 + (legSwing * 20), torsoBottomY + 35);
            ctx.moveTo(torsoBottomX, torsoBottomY);
            ctx.lineTo(torsoBottomX + 15 - (legSwing * 20), torsoBottomY + 35);
            ctx.stroke();
        }
    }

    function drawEnvironment() {
        ctx.fillStyle = "#555555";
        for (let i = 200; i < world.width; i += 300) {
            ctx.fillRect(i, world.height - 100, 20, 90);
            ctx.fillStyle = "#444444";
            ctx.fillRect(i - 10, world.height - 110, 40, 10);
            ctx.fillStyle = "#555555";
        }
    }

    function update() {
        stickman.isMoving = false;

        if (keys["ArrowRight"] || keys["KeyD"]) {
            if (stickman.velocityX < stickman.speed) stickman.velocityX += 0.8;
            stickman.isMoving = true;
        }
        if (keys["ArrowLeft"] || keys["KeyA"]) {
            if (stickman.velocityX > -stickman.speed) stickman.velocityX -= 0.8;
            stickman.isMoving = true;
        }

        if ((keys["ArrowUp"] || keys["Space"] || keys["KeyW"]) && stickman.grounded) {
            stickman.jumpForce = 13;
            stickman.velocityY = -stickman.jumpForce;
            stickman.grounded = false;
        }

        stickman.velocityY += physics.gravity;
        stickman.velocityX *= physics.friction;

        stickman.x += stickman.velocityX;
        stickman.y += stickman.velocityY;

        if (stickman.isMoving) {
            stickman.animTimer += Math.abs(stickman.velocityX);
        } else {
            stickman.animTimer = 0;
        }

        if (stickman.y + 85 >= world.height) {
            stickman.y = world.height - 85;
            stickman.velocityY = 0;
            stickman.grounded = true;
        }

        if (stickman.x - stickman.radius < 0) stickman.x = stickman.radius;
        if (stickman.x + stickman.radius > world.width) stickman.x = world.width - stickman.radius;

        camera.x = stickman.x - canvas.width / 2;

        if (camera.x < 0) camera.x = 0;
        if (camera.x > world.width - canvas.width) camera.x = world.width - canvas.width;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = "#c8c8c8";
        ctx.fillRect(0, world.height - 15, world.width, 15);

        drawEnvironment();

        drawStickman(stickman.x, stickman.y, stickman.color);

        ctx.restore();

        ctx.fillStyle = "#333";
        ctx.font = "14px Arial";
        ctx.fillText(`Posición del mapa: ${Math.floor(stickman.x)}px / ${world.width}px`, 20, 30);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
    </script>
</body>
</html>
